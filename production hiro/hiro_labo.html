<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="/Hiro-prod/production%20hiro/apple-touch-icon.png">
<link rel="manifest" href="/Hiro-prod/production%20hiro/manifest-labo.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiro Labo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e2e0d8;--border-s:#c8c5ba;
  --text:#1a1916;--muted:#6b6860;--hint:#a09d96;
  --dsm:#1a5fa8;--mgt:#0d7a52;--paita:#b84a1a;--ville:#7a3db8;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;padding-bottom:28px;}

.hdr{background:var(--text);color:#fff;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.logo{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:500;}
.hdr-sub{font-size:10px;color:#999;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#3db87a;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:#aaa;}

.date-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 1rem;display:flex;align-items:center;gap:12px;}
.date-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border-s);background:none;cursor:pointer;font-size:17px;color:var(--text);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.date-lbl{flex:1;text-align:center;font-size:14px;font-weight:600;text-transform:capitalize;}

.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;position:sticky;top:52px;z-index:99;}
.nav-tab{flex:1;padding:12px 8px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;text-align:center;-webkit-tap-highlight-color:transparent;transition:color .15s;}
.nav-tab.active{color:var(--text);font-weight:600;border-bottom-color:var(--text);}

.page{display:none;}.page.active{display:block;}
.main{padding:12px;max-width:760px;margin:0 auto;}

/* ── COMMANDE : grille boutiques ── */
.shops-grid{display:flex;flex-direction:column;gap:12px;}
@media(min-width:600px){.shops-grid{display:grid;grid-template-columns:1fr 1fr;}}

.shop-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.shop-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;}
.shop-name{font-size:15px;font-weight:700;}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.badge-ok {background:#e4f5ee;color:#0d7a52;}
.badge-wait{background:#fef3e2;color:#b07000;}
.badge-val {background:#e4f5ee;color:#0d7a52;}
.shop-time{font-size:10px;color:var(--muted);margin-right:6px;}

/* Sections internes */
.section{border-top:1px solid var(--border);}
.sec-title{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);padding:5px 10px;background:#faf9f6;}
.item-row{display:flex;align-items:baseline;padding:3px 10px 3px 10px;gap:8px;border-top:1px solid var(--border);}
.item-row:first-of-type{border-top:none;}
.item-qty{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;min-width:28px;text-align:right;flex-shrink:0;}
.item-name{font-size:11px;font-weight:500;line-height:1.3;}
.item-libre{display:flex;align-items:baseline;padding:3px 10px;gap:8px;border-top:1px solid var(--border);background:#fef9f0;}
.item-libre .item-qty{color:var(--ville);}
.no-cmd{padding:14px;text-align:center;color:var(--hint);font-size:12px;font-style:italic;border-top:1px solid var(--border);}

/* ── RIZ & ROLL ── */
.rr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.rr-card.total{border-color:var(--border-s);background:#faf9f6;}
.rr-head{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--border);}
.rr-shop{font-size:15px;font-weight:700;}
.rr-body{display:grid;grid-template-columns:repeat(3,1fr);}
.rr-cell{padding:12px 8px;border-right:1px solid var(--border);text-align:center;}
.rr-cell:last-child{border-right:none;}
.rr-label{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px;}
.rr-val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;}
.rr-val.dim{color:var(--hint);font-size:16px;font-weight:400;}
.rr-sub{font-size:10px;color:var(--hint);margin-top:2px;}
.dim-banner{background:#fef3e2;border:1px solid #e6c070;border-radius:var(--r);padding:10px 14px;margin-bottom:10px;font-size:13px;color:#7a4f00;}
</style>
</head>

var RTBL = [{r:0,v:0},{r:500,v:60},{r:750,v:60},{r:1000,v:60},{r:1250,v:70},{r:1500,v:80},{r:2000,v:100}];
function computeRolls(riz, isDim) {
  if (isDim || !riz || riz <= 0) return 0;
  var v = 0;
  for (var i = 0; i < RTBL.length; i++) { if (riz >= RTBL[i].r) v = RTBL[i].v; else break; }
  return v;
}

// ── DATE (GMT+11) ──
function ncNow(){ var n=new Date(); return new Date(n.getTime()+n.getTimezoneOffset()*60000+11*3600000); }
function getTomorrow(){ var nc=ncNow(); nc.setDate(nc.getDate()+1); return nc; }
function ds(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtFull(d){ return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtTime(ts){ return new Date(parseInt(ts)).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function getMondayStr(d){
  var dow=d.getDay(), diff=dow===0?-6:1-dow;
  var m=new Date(d.getFullYear(),d.getMonth(),d.getDate()+diff);
  return ds(m);
}

var currentDate = getTomorrow();

document.getElementById('date-lbl').textContent = fmtFull(currentDate);

function changeDate(delta){
  currentDate.setDate(currentDate.getDate()+delta);
  document.getElementById('date-lbl').textContent = fmtFull(currentDate);
  ordersData={}; fishData={};
  startPolling();
}
function showPage(p,el){
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(x){x.classList.remove('active');});
  document.getElementById('page-'+p).classList.add('active');
  el.classList.add('active');
  renderAll();
}

// ── GETTERS ──
function getVal(order, key){
  if(!order) return 0;
  if(order.status==='validated' && order['vqty_'+key]!==undefined)
    return parseInt(order['vqty_'+key])||0;
  return parseInt(order[key])||0;
}

// Tamago : calcul par jour si pas de valeur explicite > 0 dans Firestore
function getTamagoDefault(shop){
  var dow = currentDate.getDay();        // 0=Dim,1=Lun,...,6=Sam
  var di  = dow===0 ? 6 : dow-1;        // 0=Lun,...,6=Dim
  if(shop==='dsm'||shop==='paita') return di===6 ? 0 : 1;
  if(shop==='mgt') return [0,2,4,5].indexOf(di)!==-1 ? 1 : 0;
  return 0;
}
function getFish(shop, field){
  var key = ds(currentDate)+'__f__'+shop+'__'+field;
  if(field==='tamago'){
    // N'utiliser la valeur Firestore que si c'est un override positif explicite
    var stored = fishData[key];
    if(stored!==undefined && stored>0) return stored;
    return getTamagoDefault(shop);
  }
  return fishData[key]||0;
}
function getRiz(shop){ return fishData[ds(currentDate)+'__'+shop]||0; }
function getRoll(shop){
  var dStr=ds(currentDate);
  var manual=fishData[dStr+'__r__'+shop];
  if(manual!==undefined) return manual;
  return computeRolls(getRiz(shop), currentDate.getDay()===0);
}

// ── RENDER SECTION (seulement items > 0) ──
function mkSection(title, rows){
  if(!rows) return '';
  return '<div class="section"><div class="sec-title">'+title+'</div>'+rows+'</div>';
}
function mkRow(name, val, libre){
  if(!val||val===0) return '';
  var cls = libre ? 'item-libre' : 'item-row';
  return '<div class="'+cls+'"><div class="item-qty">'+val+'</div><div class="item-name">'+name+'</div></div>';
}

// ── RENDER CARTE BOUTIQUE ──
function renderShopCard(shop){
  var order  = ordersData[shop];
  var color  = COLORS[shop];
  var label  = LABELS[shop];
  var isVille = shop==='ville';

  // Header
  var isVal = order && order.status==='validated';
  var hasOrder = order && (order.ts || isVal);
  var ts = hasOrder ? (order.ts||order.validatedAt||0) : 0;
  var badgeHtml = !hasOrder
    ? '<span class="badge badge-wait">En attente</span>'
    : (isVal
        ? '<span class="badge badge-val">&#10003; Validée</span>'
        : '<span class="badge badge-ok">Reçue</span>'
      );
  var timeHtml = ts ? '<span class="shop-time">'+fmtTime(ts)+'</span>' : '';
  var headRight = '<div style="display:flex;align-items:center;gap:0;">'+timeHtml+badgeHtml+'</div>';
  var cardHead = '<div class="shop-head" style="border-bottom:3px solid '+color+';">'+
    '<div class="shop-name" style="color:'+color+'">'+label+'</div>'+headRight+'</div>';

  if(!hasOrder){
    return '<div class="shop-card">'+cardHead+'<div class="no-cmd">Commande non reçue</div></div>';
  }

  var libreStr = order.vlibre||order.libre||'';
  var libreObj = {};
  try{ libreObj=JSON.parse(libreStr); }catch(e){}

  // SALADE
  var saladeRows = SALADE.map(function(p){ return mkRow(p.name,getVal(order,p.key)); }).join('');

  // POISSON / RIZ / ROLL
  var poissonRows = '';
  poissonRows += mkRow('Thon',   getFish(shop,'t'));
  poissonRows += mkRow('Saumon', getFish(shop,'s'));
  poissonRows += mkRow('Aburi',  getFish(shop,'a'));
  poissonRows += mkRow('Tamago', getFish(shop,'tamago'));
  var riz = getVal(order,'rizprod')||getRiz(shop);
  poissonRows += mkRow('Riz', riz);
  if(isVille){
    poissonRows += mkRow('Rolls', getVal(order,'villerolls')||getRoll(shop));
  } else {
    poissonRows += mkRow('Roll', getRoll(shop));
    poissonRows += mkRow('Poke thon',   getVal(order,'pokethon'));
    poissonRows += mkRow('Poke saumon', getVal(order,'pokesaumon'));
    poissonRows += mkRow('Gyoza',       getVal(order,'gyoza'));
    if(shop==='dsm') poissonRows += mkRow('Poulet citron', getVal(order,'pouletcitron'));
  }

  // PLATS CHAUDS (Ville)
  var platsRows = '';
  if(isVille){
    platsRows += mkRow('Gyoza',   getVal(order,'gyoza'));
    platsRows += mkRow('Siu Mai', getVal(order,'siumai'));
    if(libreObj.plats) libreObj.plats.filter(function(i){return i.name&&i.qty>0;}).forEach(function(i){
      platsRows += mkRow(i.name, i.qty, true);
    });
  }

  // TAPAS
  var tapasList = isVille ? TAPAS_VILLE : TAPAS;
  var tapasRows = tapasList.map(function(p){ return mkRow(p.name,getVal(order,p.key)); }).join('');

  // DESSERT
  var dessertRows = DESSERT.map(function(p){ return mkRow(p.name,getVal(order,p.key)); }).join('');
  if(libreObj.tarte) libreObj.tarte.filter(function(i){return i.name&&i.qty>0;}).forEach(function(i){
    dessertRows += mkRow(i.name, i.qty, true);
  });

  // CHR (fixes)
  var chrRows = '';
  CHR_KEYS.forEach(function(k){ chrRows += mkRow(CHR_NAMES[k]||k, getVal(order,k)); });
  // CHR libres
  if(libreObj.chr) libreObj.chr.filter(function(i){return i.name&&i.qty>0;}).forEach(function(i){
    chrRows += mkRow(i.name, i.qty, true);
  });

  // Note
  var noteHtml = order.note
    ? '<div style="padding:7px 10px;font-size:11px;color:var(--muted);font-style:italic;border-top:1px solid var(--border);">'+order.note+'</div>'
    : '';

  return '<div class="shop-card">'+
    cardHead+
    mkSection('Salade', saladeRows)+
    mkSection('Poisson / Riz / Roll', poissonRows)+
    (platsRows ? mkSection('Plats chauds', platsRows) : '')+
    (tapasRows ? mkSection('Tapas', tapasRows) : '')+
    (dessertRows ? mkSection('Dessert', dessertRows) : '')+
    (chrRows ? mkSection('CHR', chrRows) : '')+
    noteHtml+
    '</div>';
}

// ── RENDER COMMANDE ──
function renderCmd(){
  var el = document.getElementById('content-cmd');
  var html = '<div class="shops-grid">';
  SHOPS.forEach(function(s){ html += renderShopCard(s); });
  html += '</div>';
  el.innerHTML = html;
}

// ── RENDER RIZ & ROLL ──
function renderRizRoll(){
  var el = document.getElementById('content-rizroll');
  var isDim = currentDate.getDay()===0;
  var html = '';
  if(isDim) html += '<div class="dim-banner">&#128204; Dimanche — pas de rolls</div>';

  var totalRiz=0, totalRolls=0;
  var allShops=['dsm','mgt','paita','ville'];
  allShops.forEach(function(s){
    var riz  = getRiz(s);
    var rolls= getRoll(s);
    var bacs = riz>0 ? Math.round(riz/250*10)/10 : 0;
    totalRiz+=riz; totalRolls+=rolls;
    var color=COLORS[s], label=LABELS[s];
    html += '<div class="rr-card">'+
      '<div class="rr-head">'+
        '<div class="rr-shop" style="color:'+color+'">'+label+'</div>'+
        (riz>0?'<div style="font-size:11px;color:var(--muted);">Riz saisi</div>':'<div style="font-size:11px;color:var(--hint);">En attente</div>')+
      '</div>'+
      '<div class="rr-body">'+
        '<div class="rr-cell"><div class="rr-label">Riz boules</div><div class="rr-val'+(riz===0?' dim':'')+'">'+( riz||'—')+'</div></div>'+
        '<div class="rr-cell"><div class="rr-label">Bacs</div><div class="rr-val'+(bacs===0?' dim':'')+'">'+( bacs||'—')+'</div></div>'+
        '<div class="rr-cell"><div class="rr-label">Rolls</div>'+
          (isDim&&s!=='ville'
            ? '<div class="rr-val dim">—</div><div class="rr-sub">Dim.</div>'
            : '<div class="rr-val'+(rolls===0?' dim':'')+'">'+( rolls||'—')+'</div>'
          )+
        '</div>'+
      '</div></div>';
  });

  var totBacs = totalRiz>0 ? Math.round(totalRiz/250*10)/10 : 0;
  html += '<div class="rr-card total">'+
    '<div class="rr-head"><div class="rr-shop">Total</div></div>'+
    '<div class="rr-body">'+
      '<div class="rr-cell"><div class="rr-label">Riz total</div><div class="rr-val'+(totalRiz===0?' dim':'')+'">'+( totalRiz||'—')+'</div></div>'+
      '<div class="rr-cell"><div class="rr-label">Bacs total</div><div class="rr-val'+(totBacs===0?' dim':'')+'">'+( totBacs||'—')+'</div></div>'+
      '<div class="rr-cell"><div class="rr-label">Rolls total</div><div class="rr-val'+(totalRolls===0?' dim':'')+'">'+( totalRolls||'—')+'</div></div>'+
    '</div></div>';
  el.innerHTML = html;
}

function renderAll(){
  renderCmd();
  renderRizRoll();
}

// ── FETCH ──
async function fetchFishData(){
  try{
    var monStr = getMondayStr(currentDate);
    var nxt = new Date(currentDate.getFullYear(),currentDate.getMonth(),currentDate.getDate()+7);
    var monNext = getMondayStr(nxt);
    var weeks = monNext!==monStr ? [monStr,monNext] : [monStr];
    for(var i=0;i<weeks.length;i++){
      var res=await fetch(_API+'/hiro-production/week_'+weeks[i]+'?key='+_KEY);
      if(res.ok){
        var json=await res.json();
        if(json.fields) Object.entries(json.fields).forEach(function(e){
          var k=e[0].replace(/--/g,'__'), v=e[1];
          if(v.integerValue!==undefined) fishData[k]=parseInt(v.integerValue);
          else if(v.doubleValue!==undefined) fishData[k]=parseFloat(v.doubleValue);
        });
      }
    }
  }catch(e){}
}
async function fetchOrders(){
  var dStr=ds(currentDate);
  var shops=['dsm','mgt','paita','ville'];
  await Promise.all(shops.map(async function(s){
    try{
      var res=await fetch(_API+'/hiro-orders/order_'+dStr+'_'+s+'?key='+_KEY);
      if(res.ok){
        var json=await res.json(); var d={};
        if(json.fields) Object.entries(json.fields).forEach(function(e){
          var k=e[0],v=e[1];
          if(v.integerValue!==undefined) d[k]=parseInt(v.integerValue);
          else if(v.stringValue!==undefined) d[k]=v.stringValue;
          else if(v.booleanValue!==undefined) d[k]=v.booleanValue;
        });
        ordersData[s]=d;
      }
    }catch(e){}
  }));
  renderAll();
}
function startPolling(){
  if(_poll) clearInterval(_poll);
  fetchFishData().then(function(){ fetchOrders(); });
  _poll=setInterval(fetchOrders,8000);
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('https://nikosirot-collab.github.io/Hiro-prod/production%20hiro/sw.js').catch(function(){});
}
startPolling();
</script>
