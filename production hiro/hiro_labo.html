<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="/Hiro-prod/production%20hiro/apple-touch-icon.png">
<link rel="manifest" href="/Hiro-prod/production%20hiro/manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiro Labo — Commandes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e2e0d8;--border-s:#c8c5ba;
  --text:#1a1916;--muted:#6b6860;--hint:#a09d96;
  --dsm:#1a5fa8;--mgt:#0d7a52;--paita:#b84a1a;--ville:#7a3db8;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;padding-bottom:28px;}

/* HEADER */
.hdr{background:var(--text);color:#fff;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.logo{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:500;}
.hdr-sub{font-size:10px;color:#999;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#3db87a;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:#aaa;}

/* DATE */
.date-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 1rem;display:flex;align-items:center;gap:12px;}
.date-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border-s);background:none;cursor:pointer;font-size:17px;color:var(--text);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.date-lbl{flex:1;text-align:center;font-size:14px;font-weight:600;text-transform:capitalize;}

/* TABS */
.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;z-index:99;}
.nav::-webkit-scrollbar{display:none;}
.nav-tab{padding:11px 15px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:color .15s;}
.nav-tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text);}

/* PAGE */
.page{display:none;}.page.active{display:block;}
.main{padding:1rem;max-width:680px;margin:0 auto;}

/* FICHE */
.fiche{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden;}
.fiche-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:2px solid var(--border-s);}
.fiche-shop{font-size:17px;font-weight:700;}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.badge-ok{background:#e4f5ee;color:#0d7a52;}
.badge-wait{background:#fef3e2;color:#b07000;}
.badge-val{background:#e4f5ee;color:#0d7a52;}
.fiche-time{font-size:10px;color:var(--muted);text-align:right;margin-bottom:3px;}
.no-order{padding:20px;text-align:center;color:var(--hint);font-size:13px;}

/* 2 COLONNES TOP */
.fiche-top{display:grid;grid-template-columns:1fr 1fr;border-bottom:3px solid var(--border-s);}
.col-left{border-right:1px solid var(--border);}
.col-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);padding:6px 10px;background:#faf9f6;border-bottom:1px solid var(--border);}
.prod-row{display:flex;align-items:baseline;padding:5px 10px;gap:8px;border-bottom:1px solid var(--border);}
.prod-row:last-child{border-bottom:none;}
.prod-qty{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;min-width:32px;text-align:right;flex-shrink:0;}
.prod-qty.z{color:var(--hint);font-size:13px;font-weight:400;}
.prod-name{font-size:12px;font-weight:500;line-height:1.3;}
.prod-name.z{color:var(--hint);font-weight:400;}

/* 3 COLONNES BOTTOM */
.fiche-bot{display:grid;grid-template-columns:1fr 1fr 1fr;}
.bot-col{border-right:1px solid var(--border);}
.bot-col:last-child{border-right:none;}
.bot-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);padding:6px 10px;background:#faf9f6;border-bottom:1px solid var(--border);}
.bot-row{display:flex;align-items:baseline;padding:5px 10px;gap:6px;border-bottom:1px solid var(--border);}
.bot-row:last-child{border-bottom:none;}
.bot-qty{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;min-width:26px;text-align:right;flex-shrink:0;}
.bot-qty.z{color:var(--hint);font-size:12px;font-weight:400;}
.bot-name{font-size:12px;font-weight:500;}
.bot-name.z{color:var(--hint);font-weight:400;}
.bot-libre{display:flex;align-items:baseline;padding:5px 10px;gap:6px;border-bottom:1px solid var(--border);background:#fef9f0;}
.bot-libre:last-child{border-bottom:none;}
.bot-libre-qty{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;min-width:26px;text-align:right;flex-shrink:0;color:var(--ville);}
.bot-libre-name{font-size:12px;font-weight:500;}
.bot-empty{padding:10px;font-size:12px;color:var(--hint);font-style:italic;text-align:center;}
.fiche-note{padding:8px 12px;font-size:11px;color:var(--muted);font-style:italic;border-top:1px solid var(--border);}

/* RÉSUMÉ */
.resume-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.resume-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;align-items:center;gap:10px;}
.resume-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.resume-shop{font-size:13px;font-weight:600;}
.resume-info{font-size:11px;color:var(--muted);margin-top:2px;}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;}
.tots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:7px;}
.tot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;}
.tot-name{font-size:10px;color:var(--muted);margin-bottom:2px;}
.tot-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;}
.tot-val.z{color:var(--hint);font-size:14px;font-weight:400;}

/* RIZ & ROLL */
.rr-section{margin-bottom:12px;}
.rr-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;}
.rr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.rr-card.total{border-color:var(--border-s);}
.rr-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
.rr-shop-name{font-size:15px;font-weight:700;}
.rr-body{display:grid;grid-template-columns:repeat(3,1fr);}
.rr-cell{padding:12px 10px;border-right:1px solid var(--border);text-align:center;}
.rr-cell:last-child{border-right:none;}
.rr-label{font-size:10px;color:var(--muted);margin-bottom:4px;}
.rr-val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;}
.rr-val.dim{color:var(--hint);font-size:16px;font-weight:400;}
.rr-sub{font-size:10px;color:var(--hint);margin-top:2px;}
.dim-banner{background:#fef3e2;border:1px solid #e6c070;border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:13px;color:#7a4f00;}
</style>
</head>

<script>

  {key:'bo',name:'Bun Bo'},{key:'sin',name:'Singapour'},{key:'thon',name:'Thon mariné'},
  {key:'thai',name:'Thaï'},{key:'plp',name:'Poulpe'},{key:'rouleaux',name:'Rouleau'},

];

];

// Rolls table (même que access)
var RTBL = [{r:0,v:0},{r:500,v:60},{r:750,v:60},{r:1000,v:60},{r:1250,v:70},{r:1500,v:80},{r:2000,v:100}];
function computeRolls(riz, isDim) {
  if (isDim) return 0;
  if (!riz || riz <= 0) return 0;
  var v = 0;
  for (var i = 0; i < RTBL.length; i++) { if (riz >= RTBL[i].r) v = RTBL[i].v; else break; }
  return v;
}

// ─── DATE UTILS (GMT+11 Nouméa) ───
function ncNow() {
  var n = new Date();
  return new Date(n.getTime() + n.getTimezoneOffset() * 60000 + 11 * 3600000);
}
function getTomorrow() {
  var nc = ncNow(); nc.setDate(nc.getDate() + 1); return nc;
}
function ds(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtFull(d) {
  return d.toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function fmtTime(ts) {
  return new Date(parseInt(ts)).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
}
function getMondayStr(d) {
  var dow = d.getDay(), diff = dow === 0 ? -6 : 1 - dow;
  var m = new Date(d.getFullYear(), d.getMonth(), d.getDate() + diff);
  return ds(m);
}

// ─── STATE ───
var currentDate = getTomorrow();
var ordersData  = {};
var fishData    = {};
var _poll       = null;

document.getElementById('date-lbl').textContent = fmtFull(currentDate);

function changeDate(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  document.getElementById('date-lbl').textContent = fmtFull(currentDate);
  ordersData = {}; fishData = {};
  startPolling();
}

function showPage(p, el) {
  document.querySelectorAll('.page').forEach(function(x) { x.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(x) { x.classList.remove('active'); });
  document.getElementById('page-' + p).classList.add('active');
  el.classList.add('active');
  renderAll();
}

// ─── HELPERS ───
function getVal(order, key) {
  if (!order) return 0;
  if (order.status === 'validated' && order['vqty_' + key] !== undefined)
    return parseInt(order['vqty_' + key]) || 0;
  return parseInt(order[key]) || 0;
}
function getFish(shop, field) {
  return fishData[ds(currentDate) + '__f__' + shop + '__' + field] || 0;
}
function getRiz(shop) {
  return fishData[ds(currentDate) + '__' + shop] || 0;
}
function getRoll(shop) {
  var dStr = ds(currentDate);
  var manual = fishData[dStr + '__r__' + shop];
  if (manual !== undefined) return manual;
  var riz = getRiz(shop);
  var isDim = currentDate.getDay() === 0;
  return computeRolls(riz, isDim);
}

// ─── RENDER ROW ───
function pRow(name, val) {
  var z = !val || val === 0;
  return '<div class="prod-row">'
    + '<div class="prod-qty' + (z ? ' z' : '') + '">' + (z ? '—' : val) + '</div>'
    + '<div class="prod-name' + (z ? ' z' : '') + '">' + name + '</div>'
    + '</div>';
}
function bRow(name, val) {
  var z = !val || val === 0;
  return '<div class="bot-row">'
    + '<div class="bot-qty' + (z ? ' z' : '') + '">' + (z ? '—' : val) + '</div>'
    + '<div class="bot-name' + (z ? ' z' : '') + '">' + name + '</div>'
    + '</div>';
}
function libreRow(name, val) {
  return '<div class="bot-libre">'
    + '<div class="bot-libre-qty">' + val + '</div>'
    + '<div class="bot-libre-name">' + name + '</div>'
    + '</div>';
}

// ─── RENDER FICHE SHOP ───
function renderFiche(shop) {
  var order  = ordersData[shop];
  var color  = SHOP_COLORS[shop];
  var label  = SHOP_LABELS[shop];
  var isVille = shop === 'ville';

  // Pas de commande
  if (!order || (!order.ts && order.status !== 'validated')) {
    return '<div class="fiche">'
      + '<div class="fiche-hdr"><div class="fiche-shop" style="color:' + color + '">' + label + '</div>'
      + '<span class="badge badge-wait">En attente</span></div>'
      + '<div class="no-order">Commande non reçue</div></div>';
  }

  var isVal = order.status === 'validated';
  var ts = order.ts || order.validatedAt || 0;
  var hdrRight = '<div style="text-align:right">'
    + '<div class="fiche-time">Reçue à ' + fmtTime(ts) + '</div>'
    + (isVal ? '<span class="badge badge-val">✓ Validée</span>' : '<span class="badge badge-ok">Reçue</span>')
    + '</div>';

  // ── COLONNE GAUCHE : Salade ──
  var saladeRows = SALADE.map(function(p) {
    return pRow(p.name, getVal(order, p.key));
  }).join('');

  // ── COLONNE DROITE : Poisson / Riz / Roll ──
  var rightItems = [];
  if (!isVille) {
    rightItems.push({name:'Thon',   val: getFish(shop,'t')});
    rightItems.push({name:'Saumon', val: getFish(shop,'s')});
    rightItems.push({name:'Aburi',  val: getFish(shop,'a')});
    rightItems.push({name:'Tamago', val: getFish(shop,'tamago')});
    rightItems.push({name:'Riz',    val: getVal(order,'rizprod') || getRiz(shop)});
    rightItems.push({name:'Roll',   val: getRoll(shop)});
    rightItems.push({name:'Poke thon',   val: getVal(order,'pokethon')});
    rightItems.push({name:'Poke saumon', val: getVal(order,'pokesaumon')});
    rightItems.push({name:'Gyoza',       val: getVal(order,'gyoza')});
    if (shop === 'dsm') rightItems.push({name:'Poulet citron', val: getVal(order,'pouletcitron')});
  } else {
    // Ville : poisson fixe + rolls ville + plats chauds
    rightItems.push({name:'Thon',   val: getFish(shop,'t') || 55});
    rightItems.push({name:'Saumon', val: getFish(shop,'s') || 75});
    rightItems.push({name:'Aburi',  val: getFish(shop,'a') || 30});
    rightItems.push({name:'Rolls',  val: getVal(order,'villerolls') || getRoll(shop)});
  }
  var rightRows = rightItems.map(function(p) { return pRow(p.name, p.val); }).join('');

  // Plats chauds libres pour Ville
  var libreStr = order.vlibre || order.libre || '';
  var libreObj = {};
  try { libreObj = JSON.parse(libreStr); } catch(e) {}
  if (isVille && libreObj.plats) {
    libreObj.plats.filter(function(i) { return i.name && i.qty > 0; }).forEach(function(i) {
      rightRows += '<div class="prod-row" style="background:#fef9f0;">'
        + '<div class="prod-qty" style="color:var(--ville);">' + i.qty + '</div>'
        + '<div class="prod-name">' + i.name + '</div></div>';
    });
  }

  var rightColTitle = isVille ? 'Poisson / Rolls / Plats' : 'Poisson / Riz / Roll';

  // ── DESSERT ──
  var dessertRows = DESSERT.map(function(p) { return bRow(p.name, getVal(order, p.key)); }).join('');
  if (libreObj.tarte) {
    libreObj.tarte.filter(function(i) { return i.name && i.qty > 0; }).forEach(function(i) {
      dessertRows += libreRow(i.name, i.qty);
    });
  }
  if (!dessertRows) dessertRows = '<div class="bot-empty">—</div>';

  // ── TAPAS ──
  var tapasList = isVille ? TAPAS_VILLE : TAPAS;
  var tapasRows = tapasList.map(function(p) { return bRow(p.name, getVal(order, p.key)); }).join('');
  if (!tapasRows) tapasRows = '<div class="bot-empty">—</div>';

  // ── CHR ──
  var chrRows = '<div class="bot-empty">—</div>';
  if (libreObj.chr) {
    var chrItems = libreObj.chr.filter(function(i) { return i.name && i.qty > 0; });
    if (chrItems.length > 0) {
      chrRows = chrItems.map(function(i) { return libreRow(i.name, i.qty); }).join('');
    }
  }

  // Note
  var noteHtml = order.note ? '<div class="fiche-note">' + order.note + '</div>' : '';

  return '<div class="fiche">'
    + '<div class="fiche-hdr"><div class="fiche-shop" style="color:' + color + '">' + label + '</div>' + hdrRight + '</div>'
    + '<div class="fiche-top">'
    + '<div class="col-left"><div class="col-title">Salade</div>' + saladeRows + '</div>'
    + '<div><div class="col-title">' + rightColTitle + '</div>' + rightRows + '</div>'
    + '</div>'
    + '<div class="fiche-bot">'
    + '<div class="bot-col"><div class="bot-title">Dessert</div>' + dessertRows + '</div>'
    + '<div class="bot-col"><div class="bot-title">Tapas</div>' + tapasRows + '</div>'
    + '<div class="bot-col"><div class="bot-title">CHR</div>' + chrRows + '</div>'
    + '</div>'
    + noteHtml
    + '</div>';
}

// ─── RENDER RÉSUMÉ ───
function renderResume() {
  var el = document.getElementById('content-resume');

  // Cartes statut
  var cards = '<div class="resume-grid">';
  SHOPS.forEach(function(s) {
    var o = ordersData[s];
    var ok = o && (o.ts || o.status === 'validated');
    var isVal = ok && o.status === 'validated';
    var ts = ok ? (o.ts || o.validatedAt) : 0;
    var info = ok ? (isVal ? '✓ Validée à ' + fmtTime(ts) : 'Reçue à ' + fmtTime(ts)) : 'En attente';
    cards += '<div class="resume-card">'
      + '<div class="resume-dot" style="background:' + SHOP_COLORS[s] + '"></div>'
      + '<div><div class="resume-shop">' + SHOP_LABELS[s] + '</div>'
      + '<div class="resume-info">' + info + '</div></div>'
      + '<div style="margin-left:auto;font-size:18px;">' + (ok ? '✅' : '⏳') + '</div>'
      + '</div>';
  });
  cards += '</div>';

  // Totaux
  var allP = SALADE.concat(DESSERT).concat(TAPAS);
  var tots = {};
  allP.forEach(function(p) { tots[p.key] = 0; });
  SHOPS.forEach(function(s) {
    var o = ordersData[s] || {};
    allP.forEach(function(p) { tots[p.key] += getVal(o, p.key); });
  });
  var totHtml = '<div class="sec-title">Totaux commandes</div><div class="tots-grid">';
  allP.forEach(function(p) {
    var v = tots[p.key];
    totHtml += '<div class="tot-card"><div class="tot-name">' + p.name + '</div>'
      + '<div class="tot-val' + (v === 0 ? ' z' : '') + '">' + (v || '—') + '</div></div>';
  });
  totHtml += '</div>';
  el.innerHTML = cards + totHtml;
}

// ─── RENDER RIZ & ROLL ───
function renderRizRoll() {
  var el = document.getElementById('content-rizroll');
  var isDim = currentDate.getDay() === 0;
  var html = '';

  if (isDim) {
    html += '<div class="dim-banner">📌 Dimanche — pas de rolls (sauf si fête)</div>';
  }

  var totalRiz = 0, totalRolls = 0;

  SHOPS.forEach(function(s) {
    var riz   = getRiz(s);
    var rolls = getRoll(s);
    var color = SHOP_COLORS[s];
    var label = SHOP_LABELS[s];
    var bacs  = riz > 0 ? Math.round(riz / 250 * 10) / 10 : 0;
    totalRiz   += riz;
    totalRolls += rolls;

    var rizOk  = riz > 0;
    var rollOk = rolls > 0 && !isDim;

    html += '<div class="rr-card">'
      + '<div class="rr-head">'
      + '<div class="rr-shop-name" style="color:' + color + '">' + label + '</div>'
      + (rizOk ? '<div style="font-size:11px;color:var(--muted);">Riz saisi</div>' : '<div style="font-size:11px;color:var(--hint);">En attente</div>')
      + '</div>'
      + '<div class="rr-body">'
      + '<div class="rr-cell"><div class="rr-label">Riz boules</div><div class="rr-val' + (riz === 0 ? ' dim' : '') + '">' + (riz || '—') + '</div></div>'
      + '<div class="rr-cell"><div class="rr-label">Bacs</div><div class="rr-val' + (bacs === 0 ? ' dim' : '') + '">' + (bacs || '—') + '</div></div>'
      + '<div class="rr-cell"><div class="rr-label">Rolls</div>'
      + (isDim && s !== 'ville'
          ? '<div class="rr-val dim">—</div><div class="rr-sub">Dim.</div>'
          : '<div class="rr-val' + (!rollOk ? ' dim' : '') + '">' + (rolls || '—') + '</div>'
        )
      + '</div>'
      + '</div></div>';
  });

  // Total
  var totBacs = totalRiz > 0 ? Math.round(totalRiz / 250 * 10) / 10 : 0;
  html += '<div class="rr-card total">'
    + '<div class="rr-head"><div class="rr-shop-name">Total</div></div>'
    + '<div class="rr-body">'
    + '<div class="rr-cell"><div class="rr-label">Riz total</div><div class="rr-val' + (totalRiz === 0 ? ' dim' : '') + '">' + (totalRiz || '—') + '</div></div>'
    + '<div class="rr-cell"><div class="rr-label">Bacs total</div><div class="rr-val' + (totBacs === 0 ? ' dim' : '') + '">' + (totBacs || '—') + '</div></div>'
    + '<div class="rr-cell"><div class="rr-label">Rolls total</div><div class="rr-val' + (totalRolls === 0 ? ' dim' : '') + '">' + (totalRolls || '—') + '</div></div>'
    + '</div></div>';

  el.innerHTML = html;
}

// ─── RENDER ALL ───
function renderAll() {
  renderResume();
  SHOPS.forEach(function(s) {
    document.getElementById('content-' + s).innerHTML = renderFiche(s);
  });
  renderRizRoll();
}

// ─── FETCH FISH DATA (hiro-production) ───
async function fetchFishData() {
  try {
    var dStr = ds(currentDate);
    var monStr  = getMondayStr(currentDate);
    // Aussi charger la semaine suivante si besoin
    var nextDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate() + 7);
    var monStrNext = getMondayStr(nextDate);
    var weeks = [monStr];
    if (monStrNext !== monStr) weeks.push(monStrNext);
    for (var i = 0; i < weeks.length; i++) {
      var res = await fetch(_API + '/hiro-production/week_' + weeks[i] + '?key=' + _KEY);
      if (res.ok) {
        var json = await res.json();
        if (json.fields) Object.entries(json.fields).forEach(function(e) {
          var k = e[0].replace(/--/g, '__'), v = e[1];
          if (v.integerValue !== undefined) fishData[k] = parseInt(v.integerValue);
          else if (v.doubleValue !== undefined) fishData[k] = parseFloat(v.doubleValue);
        });
      }
    }
  } catch(e) {}
}

// ─── FETCH ORDERS ───
async function fetchOrders() {
  var dStr = ds(currentDate);
  await Promise.all(SHOPS.map(async function(s) {
    try {
      var res = await fetch(_API + '/hiro-orders/order_' + dStr + '_' + s + '?key=' + _KEY);
      if (res.ok) {
        var json = await res.json();
        var d = {};
        if (json.fields) Object.entries(json.fields).forEach(function(e) {
          var k = e[0], v = e[1];
          if (v.integerValue  !== undefined) d[k] = parseInt(v.integerValue);
          else if (v.stringValue  !== undefined) d[k] = v.stringValue;
          else if (v.booleanValue !== undefined) d[k] = v.booleanValue;
        });
        ordersData[s] = d;
      }
    } catch(e) {}
  }));
  renderAll();
}

// ─── POLLING ───
function startPolling() {
  if (_poll) clearInterval(_poll);
  fetchFishData().then(function() { fetchOrders(); });
  _poll = setInterval(fetchOrders, 8000);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('https://nikosirot-collab.github.io/Hiro-prod/production%20hiro/sw.js')
    .catch(function(e) {});
}

startPolling();
</script>

<!-- PRESENCE / PING -->
<script>
(function(){
  var _PING_API = 'https://firestore.googleapis.com/v1/projects/hiro-sushi-nc/databases/(default)/documents/hiro-presence';
  var _PING_KEY = 'AIzaSyAeGNmrF96_64HYYQom7xsGM09BjNeI6EE';
  var _IFACE = 'Hiro Labo';
  var _SHOP  = 'labo';

  var _devId = localStorage.getItem('hiro-dev-id');
  if (!_devId) { _devId = 'dev-' + Math.random().toString(36).substr(2,9); localStorage.setItem('hiro-dev-id', _devId); }

  function _pingName() { return localStorage.getItem('hiro-user-name') || ''; }

  async function _sendPing() {
    try {
      var chkRes = await fetch(_PING_API + '/' + _devId + '?key=' + _PING_KEY);
      if (chkRes.ok) {
        var chkJson = await chkRes.json();
        if (chkJson.fields && chkJson.fields.disabled && chkJson.fields.disabled.booleanValue === true) {
          sessionStorage.clear();
          document.body.innerHTML = "<div style='display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1916;color:#fff;font-size:16px;text-align:center;padding:24px;'><div>Accès désactivé<br><small style='color:#888;'>Contactez l'administrateur</small></div></div>";
          return;
        }
      }
      var ua = navigator.userAgent;
      var fields = {
        iface:    {stringValue: _IFACE},
        shop:     {stringValue: _SHOP},
        devId:    {stringValue: _devId},
        userName: {stringValue: _pingName()},
        ts:       {integerValue: Date.now()},
        ua:       {stringValue: ua.substr(0, 80)},
        device:   {stringValue: (function(){
          var w = window.screen.width, t = 'ontouchstart' in window;
          if (/iPad/.test(ua) || (t && w >= 768)) return 'iPad';
          if (/iPhone/.test(ua)) return 'iPhone';
          if (/Android/.test(ua) && t && w < 768) return 'Android Phone';
          if (/Android/.test(ua) && t) return 'Android Tablet';
          if (/Macintosh/.test(ua)) return 'Mac';
          if (/Windows/.test(ua)) return 'PC Windows';
          return 'Inconnu';
        })()},
        browser:  {stringValue: (function(){
          var ua = navigator.userAgent;
          if (/CriOS/.test(ua)) return 'Chrome';
          if (/FxiOS/.test(ua)) return 'Firefox';
          if (/Chrome/.test(ua)) return 'Chrome';
          if (/Firefox/.test(ua)) return 'Firefox';
          if (/Safari/.test(ua)) return 'Safari';
          return '';
        })()}
      };
      await fetch(_PING_API + '/' + _devId + '?key=' + _PING_KEY, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({fields: fields})
      });
    } catch(e) {}
  }

  window._laboSendPing = _sendPing;
  _sendPing();
  setInterval(_sendPing, 30000);

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden && window._laboSendPing) window._laboSendPing();
  });

  window.addEventListener('beforeunload', function() {
    try {
      fetch(_PING_API + '/' + _devId + '?key=' + _PING_KEY, {
        method: 'PATCH', keepalive: true,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({fields: {iface:{stringValue:_IFACE}, shop:{stringValue:_SHOP}, devId:{stringValue:_devId}, ts:{integerValue:0}}})
      });
    } catch(e) {}
  });
})();
</script>
