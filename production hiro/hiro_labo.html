<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiro Labo — Commandes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--border:#e2e0d8;--border-strong:#c8c5ba;--text:#1a1916;--text-muted:#6b6860;--text-hint:#a09d96;--radius:8px;--dsm:#1a5fa8;--mgt:#0d7a52;--paita:#b84a1a;--ville:#7a3db8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;padding-bottom:20px;}
.app-header{background:var(--text);color:#fff;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.app-header h1{font-size:15px;font-weight:500;}
.subtitle{font-size:11px;color:#999;margin-top:1px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#3db87a;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:#aaa;}
.date-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 1rem;display:flex;align-items:center;gap:12px;}
.date-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border-strong);background:none;cursor:pointer;font-size:16px;color:var(--text);display:flex;align-items:center;justify-content:center;}
.date-label{flex:1;text-align:center;font-size:14px;font-weight:600;text-transform:capitalize;}
.nav-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{padding:12px 14px;font-size:13px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;}
.nav-tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text);}
.page{display:none;}.page.active{display:block;}
.main{padding:1rem;max-width:700px;margin:0 auto;}

/* FICHE */
.fiche{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.fiche-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:2px solid var(--border-strong);}
.fiche-shop{font-size:17px;font-weight:700;}
.fiche-time{font-size:11px;color:var(--text-muted);text-align:right;}
.fiche-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;margin-top:3px;display:inline-block;}
.status-ok{background:#e4f5ee;color:#0d7a52;}
.status-wait{background:#fef3e2;color:#b07000;}
.no-order{padding:24px;text-align:center;color:var(--text-hint);}

/* DEUX COLONNES */
.fiche-top{display:grid;grid-template-columns:1fr 1fr;border-bottom:3px solid var(--border-strong);}
.col{padding:0;}
.col-left{border-right:1px solid var(--border);}
.col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-hint);padding:7px 12px;background:#faf9f6;border-bottom:1px solid var(--border);}
.prod-row{display:flex;align-items:baseline;padding:6px 12px;gap:10px;border-bottom:1px solid var(--border);}
.prod-row:last-child{border-bottom:none;}
.prod-qty{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;min-width:36px;text-align:right;flex-shrink:0;}
.prod-qty.zero{font-size:13px;color:var(--text-hint);font-weight:400;}
.prod-name{font-size:13px;font-weight:500;line-height:1.3;}
.prod-name.zero{color:var(--text-hint);font-weight:400;}

/* PARTIE BASSE */
.fiche-bottom{display:grid;grid-template-columns:1fr 1fr 1fr;}
.bottom-col{padding:0;border-right:1px solid var(--border);}
.bottom-col:last-child{border-right:none;}
.bottom-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-hint);padding:7px 12px;background:#faf9f6;border-bottom:1px solid var(--border);}
.bottom-row{display:flex;align-items:baseline;padding:6px 12px;gap:8px;border-bottom:1px solid var(--border);}
.bottom-row:last-child{border-bottom:none;}
.bottom-qty{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;min-width:30px;text-align:right;flex-shrink:0;}
.bottom-qty.zero{font-size:12px;color:var(--text-hint);font-weight:400;}
.bottom-name{font-size:12px;font-weight:500;}
.bottom-name.zero{color:var(--text-hint);font-weight:400;}
.libre-row{display:flex;align-items:baseline;padding:6px 12px;gap:8px;border-bottom:1px solid var(--border);background:#fef9f0;}
.libre-row:last-child{border-bottom:none;}
.libre-qty{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;min-width:30px;text-align:right;color:var(--ville);}
.libre-name{font-size:12px;font-weight:500;}
.empty-col{padding:10px 12px;font-size:12px;color:var(--text-hint);font-style:italic;}

/* RÉSUMÉ */
.resume-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.resume-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px;}
.resume-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.resume-shop{font-size:13px;font-weight:600;}
.resume-info{font-size:11px;color:var(--text-muted);margin-top:1px;}
.totaux-section{margin-bottom:16px;}
.totaux-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:8px;}
.totaux-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
.total-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.total-name{font-size:10px;color:var(--text-muted);margin-bottom:2px;}
.total-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;}
.total-val.zero{color:var(--text-hint);font-weight:400;font-size:14px;}
</style>
</head>

<script>
var _API='https://firestore.googleapis.com/v1/projects/hiro-sushi-nc/databases/(default)/documents/hiro-orders';
var _KEY='AIzaSyAeGNmrF96_64HYYQom7xsGM09BjNeI6EE';
var SHOPS=['dsm','mgt','paita','ville'];
var SHOP_LABELS={dsm:'DSM',mgt:'MGT',paita:'Paita',ville:'Ville'};
var SHOP_COLORS={dsm:'var(--dsm)',mgt:'var(--mgt)',paita:'var(--paita)',ville:'var(--ville)'};

// Colonne gauche : salades
var COL_LEFT=[
  {key:'bo',name:'Bun Bo'},{key:'sin',name:'Singapour'},{key:'thon',name:'Thon marine'},
  {key:'thai',name:'Thai'},{key:'plp',name:'Poulpe'},{key:'rouleaux',name:'Rouleau'},
  {key:'tataki',name:'Tataki'}
];
// Colonne droite : poisson + riz + poke + roll
var COL_RIGHT=[
  {key:'f_t',name:'Thon',fish:true},{key:'f_s',name:'Saumon',fish:true},
  {key:'f_a',name:'Aburi',fish:true},{key:'f_tamago',name:'Tamago',fish:true},
  {key:'roll',name:'Roll',prod:true},{key:'gyoza',name:'Gyoza'}
];
// Dessert
var DESSERT=[
  {key:'tiramisu',name:'Tiramisu'},{key:'ananas',name:'Ananas'},
  {key:'poebanane',name:'Poe banane'},{key:'poecitrouille',name:'Poe citrouille'},
  {key:'cheesemangue',name:'Cheese mangue'},{key:'cheeseframboise',name:'Cheese framboise'},
  {key:'tarte',name:'Tarte'}
];
// Tapas
var TAPAS=[
  {key:'gnem',name:'Grand nem'},{key:'pnem',name:'Petit nem'},
  {key:'sesame',name:'Sesame'},{key:'banhbao',name:'Banh Bao'}
];

function getTomorrow(){var now=new Date();var nc=new Date(now.getTime()+now.getTimezoneOffset()*60000+11*3600000);nc.setDate(nc.getDate()+1);return nc;}
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtFull(d){return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtTime(ts){return new Date(parseInt(ts)).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

var currentDate=getTomorrow();
var ordersData={};
var fishData={};
var _pollInterval=null;

document.getElementById('date-label').textContent=fmtFull(currentDate);

function changeDate(d){
  currentDate.setDate(currentDate.getDate()+d);
  document.getElementById('date-label').textContent=fmtFull(currentDate);
  ordersData={};fishData={};renderAll();startPolling();
}

function showPage(p,el){
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(x){x.classList.remove('active');});
  document.getElementById('page-'+p).classList.add('active');
  el.classList.add('active');
}

function pRow(name,val,small){
  var zero=!val||val===0;
  var qs=small?'bottom-qty':'prod-qty';
  var ns=small?'bottom-name':'prod-name';
  return '<div class="'+(small?'bottom-row':'prod-row')+'">'
    +'<div class="'+qs+(zero?' zero':'')+'">'+( zero?'—':val)+'</div>'
    +'<div class="'+ns+(zero?' zero':'')+'">'+name+'</div>'
    +'</div>';
}

function getFishVal(shop,field){
  // Keys stored as dStr__f__shop__field in fishData (already decoded)
  var key=ds(currentDate)+'__f__'+shop+'__'+field;
  return fishData[key]||0;
}
function getRollVal(shop){
  // Roll stored as dStr__r__shop
  return fishData[ds(currentDate)+'__r__'+shop]||0;
}
function getRizVal(shop){
  // Riz stored as dStr__shop
  return fishData[ds(currentDate)+'__'+shop]||0;
}

function renderFiche(shop,order){
  var color=SHOP_COLORS[shop];
  var label=SHOP_LABELS[shop];
  var isDSM=shop==='dsm';

  if(!order||!order.ts){
    return '<div class="fiche">'
      +'<div class="fiche-header"><div class="fiche-shop" style="color:'+color+'">'+label+'</div>'
      +'<span class="fiche-status status-wait">En attente</span></div>'
      +'<div class="no-order">Commande non reçue</div></div>';
  }

  // Colonne gauche
  var leftRows=COL_LEFT.map(function(p){return pRow(p.name,order[p.key]||0,false);}).join('');

  // Colonne droite : poisson depuis hiro-prod + poke/riz/roll depuis commande
  var rizVal=getRizVal(shop)||order.rizprod||0;
  var rightItems=[
    {name:'Thon',val:getFishVal(shop,'t')},
    {name:'Saumon',val:getFishVal(shop,'s')},
    {name:'Aburi',val:getFishVal(shop,'a')},
    {name:'Tamago',val:getFishVal(shop,'tamago')},
    {name:'Riz',val:rizVal},
    {name:'Poke thon',val:order.pokethon||0},
    {name:'Poke saumon',val:order.pokesaumon||0},
    {name:'Roll',val:getRollVal(shop)},
    {name:'Gyoza',val:order.gyoza||0},
  ];
  if(isDSM) rightItems.push({name:'Poulet citron',val:order.pouletcitron||0});
  var rightRows=rightItems.map(function(p){return pRow(p.name,p.val,false);}).join('');

  // Dessert
  var dessertRows=DESSERT.map(function(p){return pRow(p.name,order[p.key]||0,true);}).join('');
  // Tartes libres
  if(order.libre){try{var libreP=JSON.parse(order.libre);if(libreP.tarte){var tarteItems=libreP.tarte.filter(function(i){return i.name&&i.qty>0;});if(tarteItems.length>0){dessertRows+=tarteItems.map(function(i){return '<div class="bottom-row"><div class="bottom-qty">'+i.qty+'</div><div class="bottom-name">'+i.name+'</div></div>';}).join('');}}}catch(e){}}

  // Tapas
  var tapasRows=TAPAS.map(function(p){return pRow(p.name,order[p.key]||0,true);}).join('');

  // CHR libre
  var chrRows='<div class="empty-col">—</div>';
  if(order.libre){
    try{
      var libre=JSON.parse(order.libre);
      if(libre.chr){
        var items=libre.chr.filter(function(i){return i.name&&i.qty>0;});
        if(items.length>0){
          chrRows=items.map(function(i){
            return '<div class="libre-row"><div class="libre-qty">'+i.qty+'</div><div class="libre-name">'+i.name+'</div></div>';
          }).join('');
        }
      }
    }catch(e){}
  }

  var noteHtml=order.note
    ?'<div style="padding:8px 12px;font-size:12px;color:var(--text-muted);font-style:italic;border-top:1px solid var(--border)">'+order.note+'</div>'
    :'';

  return '<div class="fiche">'
    +'<div class="fiche-header">'
    +'<div class="fiche-shop" style="color:'+color+'">'+label+'</div>'
    +'<div style="text-align:right"><div class="fiche-time">Recu a '+fmtTime(order.ts)+'</div>'
    +'<span class="fiche-status status-ok">Recue</span></div>'
    +'</div>'
    // TOP : 2 colonnes
    +'<div class="fiche-top">'
    +'<div class="col col-left"><div class="col-title">Salade</div>'+leftRows+'</div>'
    +'<div class="col"><div class="col-title">Poisson / Riz / Poke</div>'+rightRows+'</div>'
    +'</div>'
    // BOTTOM : 3 colonnes
    +'<div class="fiche-bottom">'
    +'<div class="bottom-col"><div class="bottom-title">Dessert</div>'+dessertRows+'</div>'
    +'<div class="bottom-col"><div class="bottom-title">Tapas</div>'+tapasRows+'</div>'
    +'<div class="bottom-col"><div class="bottom-title">CHR</div>'+chrRows+'</div>'
    +'</div>'
    +noteHtml
    +'</div>';
}

function renderVille(order){
  var color='var(--ville)';
  if(!order||!order.ts){
    return '<div class="fiche">'
      +'<div class="fiche-header"><div class="fiche-shop" style="color:'+color+'">Ville</div>'
      +'<span class="fiche-status status-wait">En attente</span></div>'
      +'<div class="no-order">Commande non recue</div></div>';
  }

  // Salade + dessert + tapas comme les autres
  var saladeRows=COL_LEFT.map(function(p){return pRow(p.name,order[p.key]||0,false);}).join('');
  var dessertRows=DESSERT.map(function(p){return pRow(p.name,order[p.key]||0,true);}).join('');
  var tapasRows=TAPAS.map(function(p){return pRow(p.name,order[p.key]||0,true);}).join('');

  // Plats chauds libres
  var platsRows='<div class="empty-col">Aucun plat</div>';
  var chrRows='<div class="empty-col">—</div>';
  if(order.libre){
    try{
      var libre=JSON.parse(order.libre);
      if(libre.plats){
        var pitems=libre.plats.filter(function(i){return i.name&&i.qty>0;});
        if(pitems.length>0) platsRows=pitems.map(function(i){return '<div class="libre-row"><div class="libre-qty">'+i.qty+'</div><div class="libre-name">'+i.name+'</div></div>';}).join('');
      }
      if(libre.chr){
        var citems=libre.chr.filter(function(i){return i.name&&i.qty>0;});
        if(citems.length>0) chrRows=citems.map(function(i){return '<div class="libre-row"><div class="libre-qty">'+i.qty+'</div><div class="libre-name">'+i.name+'</div></div>';}).join('');
      }
    }catch(e){}
  }

  return '<div class="fiche">'
    +'<div class="fiche-header">'
    +'<div class="fiche-shop" style="color:'+color+'">Ville</div>'
    +'<div style="text-align:right"><div class="fiche-time">Recu a '+fmtTime(order.ts)+'</div>'
    +'<span class="fiche-status status-ok">Recue</span></div>'
    +'</div>'
    +'<div class="fiche-top">'
    +'<div class="col col-left"><div class="col-title">Salade</div>'+saladeRows+'</div>'
    +'<div class="col"><div class="col-title">Plats chauds</div>'+platsRows+'</div>'
    +'</div>'
    +'<div class="fiche-bottom">'
    +'<div class="bottom-col"><div class="bottom-title">Dessert</div>'+dessertRows+'</div>'
    +'<div class="bottom-col"><div class="bottom-title">Tapas</div>'+tapasRows+'</div>'
    +'<div class="bottom-col"><div class="bottom-title">CHR</div>'+chrRows+'</div>'
    +'</div>'
    +'</div>';
}

function renderResume(){
  var el=document.getElementById('content-resume');
  var cards='<div class="resume-grid">';
  SHOPS.forEach(function(s){
    var o=ordersData[s];var ok=o&&o.ts;
    cards+='<div class="resume-card">'
      +'<div class="resume-dot" style="background:'+SHOP_COLORS[s]+'"></div>'
      +'<div><div class="resume-shop">'+SHOP_LABELS[s]+'</div>'
      +'<div class="resume-info">'+(ok?'Recu a '+fmtTime(o.ts):'En attente')+'</div></div>'
      +'<div style="margin-left:auto;font-size:18px">'+(ok?'✅':'⏳')+'</div>'
      +'</div>';
  });
  cards+='</div>';

  var allP=COL_LEFT.concat(DESSERT).concat(TAPAS);
  var tots={};
  allP.forEach(function(p){tots[p.key]=0;});
  SHOPS.forEach(function(s){var o=ordersData[s]||{};allP.forEach(function(p){tots[p.key]+=(o[p.key]||0);});});

  var totHtml='<div class="totaux-section"><div class="totaux-title">Totaux</div><div class="totaux-grid">';
  allP.forEach(function(p){
    var v=tots[p.key];
    totHtml+='<div class="total-card"><div class="total-name">'+p.name+'</div>'
      +'<div class="total-val'+(v===0?' zero':'')+'">'+( v||'—')+'</div></div>';
  });
  totHtml+='</div></div>';
  el.innerHTML=cards+totHtml;
}

function renderAll(){
  renderResume();
  ['dsm','mgt','paita'].forEach(function(s){
    document.getElementById('content-'+s).innerHTML=renderFiche(s,ordersData[s]);
  });
  document.getElementById('content-ville').innerHTML=renderVille(ordersData['ville']);
}

async function fetchFishData(){
  try{
    var tomorrow=currentDate;
    var dow=tomorrow.getDay();
    var diff=dow===0?-6:1-dow;
    var monday=new Date(tomorrow);monday.setDate(monday.getDate()+diff);
    var mondayStr=monday.getFullYear()+'-'+String(monday.getMonth()+1).padStart(2,'0')+'-'+String(monday.getDate()).padStart(2,'0');
    var res=await fetch('https://firestore.googleapis.com/v1/projects/hiro-sushi-nc/databases/(default)/documents/hiro-production/week_'+mondayStr+'?key='+_KEY);
    if(res.ok){
      var json=await res.json();
      var d={};
      if(json.fields) Object.entries(json.fields).forEach(function(e){
        if(e[1].integerValue!==undefined) d[e[0].replace(/--/g,'__')]=parseInt(e[1].integerValue);
      });
      fishData=d;
    }
  }catch(e){}
}

async function fetchOrders(){
  var dateStr=ds(currentDate);
  await Promise.all(SHOPS.map(async function(s){
    try{
      var res=await fetch(_API+'/order_'+dateStr+'_'+s+'?key='+_KEY);
      if(res.ok){
        var json=await res.json();var d={};
        if(json.fields) Object.entries(json.fields).forEach(function(e){
          var k=e[0],v=e[1];
          if(v.integerValue!==undefined) d[k]=parseInt(v.integerValue);
          else if(v.stringValue!==undefined) d[k]=v.stringValue;
        });
        ordersData[s]=d;
      }
    }catch(e){}
  }));
  renderAll();
}

function startPolling(){
  if(_pollInterval) clearInterval(_pollInterval);
  fetchFishData();
  fetchOrders();
  _pollInterval=setInterval(fetchOrders,5000);
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('https://nikosirot-collab.github.io/Hiro-prod/production%20hiro/sw.js')
    .catch(function(e){console.log('SW:',e);});
}

startPolling();
</script>
