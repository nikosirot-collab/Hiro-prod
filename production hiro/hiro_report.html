<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiro Report — Rapport IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #151817;
    --surface2: #1c201e;
    --border: #2a2f2d;
    --accent: #00e87a;
    --accent2: #00b85f;
    --text: #eef2f0;
    --text-muted: #7a8a82;
    --text-dim: #3d4a44;
    --dsm: #3b9eff;
    --mgt: #ff8c42;
    --paita: #c97dff;
    --ville: #ff5c7a;
    --warn: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #000;
    letter-spacing: -0.5px;
  }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
  .logo-sub { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 1px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface);
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  /* ── MAIN ── */
  .main { padding: 28px; max-width: 900px; margin: 0 auto; }

  /* ── DATE SELECTOR ── */
  .date-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .date-label { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .date-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .date-input:focus { border-color: var(--accent); }
  .date-input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

  /* ── AUTO TRIGGER ── */
  .auto-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .auto-label { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; flex: 1; }
  .auto-time {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 7px;
    outline: none;
    width: 80px;
    transition: border-color 0.2s;
  }
  .auto-time:focus { border-color: var(--accent); }
  .toggle {
    position: relative;
    width: 40px; height: 22px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 22px;
    transition: background 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .slider { background: var(--accent2); }
  .toggle input:checked + .slider::before { transform: translateX(18px); background: #000; }

  /* ── BTN GENERATE ── */
  .btn-generate {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 13px 24px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    width: 100%;
    justify-content: center;
    margin-bottom: 32px;
    letter-spacing: 0.3px;
  }
  .btn-generate:hover { background: #00ff88; }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled {
    background: var(--surface2);
    color: var(--text-muted);
    cursor: not-allowed;
    transform: none;
  }
  .btn-icon { font-size: 18px; }

  /* ── LOADING ── */
  .loading-box {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 48px 20px;
    text-align: center;
  }
  .loading-box.active { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .loading-step { font-size: 13px; color: var(--text); font-weight: 600; }

  /* ── REPORT CARD ── */
  .report-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.4s ease;
    margin-bottom: 32px;
  }
  .report-card.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .report-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .report-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .report-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .report-ts {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  .report-body {
    padding: 24px 20px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
  }
  .report-body strong { color: var(--accent); font-weight: 700; }

  /* ── DATA GRID ── */
  .data-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .shop-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .shop-card:hover { border-color: var(--accent2); }
  .shop-name {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .shop-dot { width: 6px; height: 6px; border-radius: 50%; }
  .shop-items { font-size: 12px; color: var(--text-muted); line-height: 1.8; }
  .shop-total {
    margin-top: 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .no-order { color: var(--text-dim); font-size: 11px; font-family: 'DM Mono', monospace; }
  .shop-card.missing { border-color: #ff5c7a44; background: #ff5c7a08; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── ERROR ── */
  .error-box {
    display: none;
    background: #ff5c7a12;
    border: 1px solid #ff5c7a44;
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 13px;
    color: #ff5c7a;
    font-family: 'DM Mono', monospace;
    margin-bottom: 24px;
  }
  .error-box.active { display: block; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 13px; line-height: 1.6; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">H</div>
    <div>
      <div class="logo-text">HIRO REPORT</div>
      <div class="logo-sub">rapport IA quotidien</div>
    </div>
  </div>
  <div class="header-right">
    <div class="date-badge" id="clockBadge">—</div>
  </div>
</div>

<div class="main">

  <!-- Date selector -->
  <div class="date-row">
    <span class="date-label">DATE DU RAPPORT</span>
    <input type="date" class="date-input" id="reportDate">
  </div>

  <!-- Auto trigger -->
  <div class="auto-row">
    <div>
      <div style="font-size:13px;font-weight:600;margin-bottom:2px;">Rapport automatique</div>
      <div class="auto-label" id="autoStatus">Désactivé — configurez une heure et activez</div>
    </div>
    <input type="time" class="auto-time" id="autoTime" value="17:00">
    <label class="toggle">
      <input type="checkbox" id="autoToggle" onchange="toggleAuto()">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Generate button -->
  <button class="btn-generate" id="btnGenerate" onclick="generateReport()">
    <span class="btn-icon">⚡</span>
    Générer le rapport IA
  </button>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Loading -->
  <div class="loading-box" id="loadingBox">
    <div class="spinner"></div>
    <div class="loading-step" id="loadingStep">Lecture des commandes…</div>
    <div class="loading-text">analyse en cours par l'agent IA</div>
  </div>

  <!-- Data preview -->
  <div id="dataPreview" style="display:none">
    <div class="section-title">COMMANDES PAR POINT DE VENTE</div>
    <div class="data-grid" id="dataGrid"></div>
  </div>

  <!-- AI Report -->
  <div class="report-card" id="reportCard">
    <div class="report-header">
      <div class="report-title">
        <div class="report-dot"></div>
        ANALYSE IA
      </div>
      <div class="report-ts" id="reportTs"></div>
    </div>
    <div class="report-body" id="reportBody"></div>
  </div>

  <!-- Empty state initial -->
  <div class="empty" id="emptyState">
    <div class="empty-icon">📊</div>
    <div class="empty-text">Sélectionnez une date et cliquez sur<br>« Générer le rapport IA » pour commencer.</div>
  </div>

</div>

<script>
// ── CONFIG ──
const _KEY = 'AIzaSyAeGNmrF96_64HYYQom7xsGM09BjNeI6EE';
const _PROJECT = 'hiro-sushi-nc';
const _BASE = `https://firestore.googleapis.com/v1/projects/${_PROJECT}/databases/(default)/documents`;
const SHOPS = [
  { id: 'dsm',   label: 'DSM',   color: '#3b9eff' },
  { id: 'mgt',   label: 'MGT',   color: '#ff8c42' },
  { id: 'paita', label: 'Paita', color: '#c97dff' },
  { id: 'ville', label: 'Ville', color: '#ff5c7a' }
];
const PRODUCT_NAMES = {
  bo:'Bun Bò', sin:'Singapour', thon:'Thon mariné', thai:'Thaï',
  plp:'Poulpe', rouleaux:'Rouleau', rizprod:'Riz',
  pokethon:'Poke thon', pokesaumon:'Poke saumon', tataki:'Tataki',
  tiramisu:'Tiramisu', ananas:'Ananas', poebanane:'Poe banane',
  poecitrouille:'Poe citrouille', cheesemangue:'Cheese mangue',
  cheeseframboise:'Cheese framboise', gyoza:'Gyoza',
  gnem:'Grand nem', pnem:'Petit nem', sesame:'Sésame', banhbao:'Banh Bao',
  villerolls:'Rolls (Ville)'
};

let _autoTimer = null;

// ── CLOCK ──
function updateClock() {
  const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Pacific/Noumea' }));
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clockBadge').textContent = `NC ${h}:${m}`;
}
setInterval(updateClock, 10000);
updateClock();

// ── DEFAULT DATE (today NC) ──
(function() {
  const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Pacific/Noumea' }));
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  document.getElementById('reportDate').value = `${y}-${m}-${d}`;
})();

// ── AUTO TOGGLE ──
function toggleAuto() {
  const enabled = document.getElementById('autoToggle').checked;
  const timeVal = document.getElementById('autoTime').value;
  if (_autoTimer) clearInterval(_autoTimer);
  if (!enabled) {
    document.getElementById('autoStatus').textContent = 'Désactivé — configurez une heure et activez';
    return;
  }
  document.getElementById('autoStatus').textContent = `Rapport automatique à ${timeVal} (heure NC)`;
  _autoTimer = setInterval(() => {
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Pacific/Noumea' }));
    const hm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    if (hm === timeVal) generateReport();
  }, 30000);
}

// ── FETCH ORDER ──
async function fetchOrder(dateStr, shopId) {
  const docId = `order_${dateStr}_${shopId}`;
  const url = `${_BASE}/hiro-orders/${docId}?key=${_KEY}`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const json = await res.json();
  if (!json.fields) return null;
  const order = {};
  Object.entries(json.fields).forEach(([k,v]) => {
    if (v.integerValue !== undefined) order[k] = parseInt(v.integerValue);
    else if (v.stringValue !== undefined) order[k] = v.stringValue;
  });
  return order;
}

// ── FETCH PRODUCTION (week doc) ──
async function fetchProduction(dateStr) {
  // Find monday of that week
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  const monday = d.toISOString().split('T')[0];
  const url = `${_BASE}/hiro-production/week_${monday}?key=${_KEY}`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const json = await res.json();
  if (!json.fields) return null;
  const data = {};
  Object.entries(json.fields).forEach(([k,v]) => {
    if (v.integerValue !== undefined) data[k] = parseInt(v.integerValue);
    else if (v.stringValue !== undefined) data[k] = v.stringValue;
    else if (v.doubleValue !== undefined) data[k] = parseFloat(v.doubleValue);
  });
  return { data, monday };
}

// ── BUILD DATA PREVIEW ──
function buildDataPreview(orders, dateStr) {
  const grid = document.getElementById('dataGrid');
  grid.innerHTML = '';
  SHOPS.forEach(shop => {
    const order = orders[shop.id];
    const card = document.createElement('div');
    card.className = 'shop-card' + (order ? '' : ' missing');
    let inner = `<div class="shop-name"><div class="shop-dot" style="background:${shop.color}"></div>${shop.label}</div>`;
    if (!order) {
      inner += `<div class="no-order">Aucune commande</div>`;
    } else {
      let rows = '';
      let total = 0;
      Object.entries(PRODUCT_NAMES).forEach(([k, name]) => {
        const qty = order[k] || 0;
        if (qty > 0) {
          rows += `<div style="display:flex;justify-content:space-between;gap:8px;">
            <span>${name}</span>
            <span style="font-family:'DM Mono',monospace;font-weight:500;color:var(--text);">${qty}</span>
          </div>`;
          total += qty;
        }
      });
      inner += `<div class="shop-items">${rows || '<span style="color:var(--text-dim)">Commande vide</span>'}</div>`;
      inner += `<div class="shop-total">Total : ${total}</div>`;
    }
    card.innerHTML = inner;
    grid.appendChild(card);
  });
  document.getElementById('dataPreview').style.display = 'block';
}

// ── FORMAT DATE ──
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

// ── GENERATE REPORT ──
async function generateReport() {
  const dateStr = document.getElementById('reportDate').value;
  if (!dateStr) { showError('Veuillez sélectionner une date.'); return; }

  setLoading(true, 'Lecture des commandes…');
  hideError();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('reportCard').classList.remove('active');
  document.getElementById('dataPreview').style.display = 'none';

  try {
    // 1. Fetch all orders
    setLoadingStep('Récupération des commandes (DSM, MGT, Paita, Ville)…');
    const orderResults = await Promise.all(
      SHOPS.map(s => fetchOrder(dateStr, s.id).then(o => ({ shop: s, order: o })))
    );
    const orders = {};
    orderResults.forEach(({ shop, order }) => { orders[shop.id] = order; });

    // 2. Fetch production
    setLoadingStep('Lecture des données de production…');
    const prodResult = await fetchProduction(dateStr);

    // 3. Build data preview
    buildDataPreview(orders, dateStr);

    // 4. Build context for AI
    setLoadingStep('Analyse IA en cours…');
    const context = buildAIContext(dateStr, orders, prodResult);

    // 5. Call Claude API
    const report = await callClaudeAPI(context, dateStr);

    // 6. Display
    setLoading(false);
    displayReport(report);

  } catch (err) {
    setLoading(false);
    showError('Erreur : ' + (err.message || err));
  }
}

// ── BUILD AI CONTEXT ──
function buildAIContext(dateStr, orders, prodResult) {
  const lines = [];
  lines.push(`=== RAPPORT DU ${formatDate(dateStr)} ===\n`);

  lines.push('--- COMMANDES PAR POINT DE VENTE ---');
  let totalGlobal = 0;
  const totauxParShop = {};
  const totauxParProduit = {};

  SHOPS.forEach(shop => {
    const order = orders[shop.id];
    if (!order) {
      lines.push(`${shop.label}: AUCUNE COMMANDE ENREGISTRÉE`);
      totauxParShop[shop.id] = 0;
      return;
    }
    lines.push(`\n${shop.label}:`);
    let shopTotal = 0;
    Object.entries(PRODUCT_NAMES).forEach(([k, name]) => {
      const qty = order[k] || 0;
      if (qty > 0) {
        lines.push(`  ${name}: ${qty}`);
        shopTotal += qty;
        totauxParProduit[name] = (totauxParProduit[name] || 0) + qty;
      }
    });
    totauxParShop[shop.id] = shopTotal;
    totalGlobal += shopTotal;
    lines.push(`  → TOTAL: ${shopTotal}`);
  });

  lines.push(`\nTOTAL GLOBAL COMMANDES: ${totalGlobal}`);

  lines.push('\n--- TOP PRODUITS (toutes boutiques) ---');
  Object.entries(totauxParProduit)
    .sort((a,b) => b[1]-a[1])
    .slice(0,10)
    .forEach(([name, qty]) => lines.push(`  ${name}: ${qty}`));

  if (prodResult && prodResult.data) {
    lines.push('\n--- DONNÉES DE PRODUCTION (semaine) ---');
    const d = prodResult.data;
    // Extract riz data for the target date
    const dayOfWeek = new Date(dateStr + 'T12:00:00').getDay();
    // 0=Sun,1=Mon,...,6=Sat
    const days = ['dim','lun','mar','mer','jeu','ven','sam'];
    const dayKey = days[dayOfWeek];
    lines.push(`Jour concerné dans la semaine: ${dayKey}`);
    // Look for keys matching the date
    const relevantKeys = Object.entries(d).filter(([k]) => k.includes(dateStr) || k.startsWith(dayKey));
    if (relevantKeys.length > 0) {
      relevantKeys.forEach(([k,v]) => lines.push(`  ${k}: ${v}`));
    } else {
      lines.push('  (données du jour non trouvées dans le document semaine)');
      // Show some prod keys as overview
      const sample = Object.entries(d).slice(0,15);
      sample.forEach(([k,v]) => lines.push(`  ${k}: ${v}`));
    }
  } else {
    lines.push('\n--- PRODUCTION: aucune donnée trouvée pour cette période ---');
  }

  return lines.join('\n');
}

// ── CALL CLAUDE API ──
async function callClaudeAPI(context, dateStr) {
  const systemPrompt = `Tu es l'agent IA de Hiro Sushi, un restaurant japonais en Nouvelle-Calédonie.
Tu analyses les données quotidiennes de commandes et de production pour générer un rapport concis et utile pour le gérant.
Réponds toujours en français. Sois direct, factuel et utile. Utilise des emojis avec modération pour structurer.
Mets en évidence les points importants, les manquants, et donne une conclusion actionnable.`;

  const userPrompt = `Voici les données du jour. Génère un rapport clair avec :
1. Un résumé des commandes par boutique (points forts, manquants)
2. Les produits les plus demandés aujourd'hui
3. Un point sur la production si les données sont disponibles
4. Une conclusion avec les points d'attention pour demain

DONNÉES :
${context}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  const text = (data.content || []).map(b => b.type === 'text' ? b.text : '').join('');
  return text;
}

// ── DISPLAY REPORT ──
function displayReport(text) {
  const now = new Date();
  const ts = now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('reportTs').textContent = `Généré à ${ts}`;

  // Render with basic bold markdown
  const rendered = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>');
  document.getElementById('reportBody').innerHTML = rendered;
  document.getElementById('reportCard').classList.add('active');
}

// ── UI HELPERS ──
function setLoading(active, step) {
  document.getElementById('loadingBox').className = active ? 'loading-box active' : 'loading-box';
  document.getElementById('btnGenerate').disabled = active;
  if (step) document.getElementById('loadingStep').textContent = step;
}
function setLoadingStep(text) {
  document.getElementById('loadingStep').textContent = text;
}
function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.className = 'error-box active';
}
function hideError() {
  document.getElementById('errorBox').className = 'error-box';
}
</script>
