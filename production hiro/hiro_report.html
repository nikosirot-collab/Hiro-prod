<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report — Rapport IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #eeecea;
  --border: #dddbd6;
  --text: #1a1916;
  --text-muted: #8a877e;
  --text-dim: #c5c2bb;
  --dsm: #1a5fa8;
  --mgt: #c45e00;
  --paita: #7c3aed;
  --ville: #c41a3a;
  --ok: #0d7a52;
  --missing: #c41a3a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;background:var(--text);color:#f5f4f0;
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{
  width:28px;height:28px;background:#f5f4f0;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:var(--text);
}
.logo-title{font-size:14px;font-weight:700;letter-spacing:0.5px;}
.logo-sub{font-size:10px;color:#8a877e;font-family:'DM Mono',monospace;margin-top:1px;}
.clock{font-family:'DM Mono',monospace;font-size:11px;color:#8a877e;}

/* TOOLBAR */
.toolbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:14px 24px;background:var(--surface);
  border-bottom:1px solid var(--border);
}
.date-label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap;}
.date-input{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  font-family:'DM Mono',monospace;font-size:13px;
  padding:7px 11px;border-radius:7px;cursor:pointer;outline:none;
  transition:border-color .2s;
}
.date-input:focus{border-color:var(--text);}
.date-input::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5;}
.btn-load{
  display:flex;align-items:center;gap:7px;
  background:var(--text);color:#f5f4f0;border:none;
  padding:8px 18px;border-radius:7px;font-family:'Syne',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:opacity .15s,transform .1s;letter-spacing:.3px;
}
.btn-load:hover{opacity:.85;}
.btn-load:active{transform:scale(.97);}
.btn-load:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.sep{flex:1;}
.nav-dates{display:flex;gap:6px;}
.nav-btn{
  background:var(--bg);border:1px solid var(--border);color:var(--text-muted);
  font-family:'DM Mono',monospace;font-size:11px;
  padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;
  transition:all .15s;
}
.nav-btn:hover{border-color:var(--text);color:var(--text);}

/* MAIN */
.main{padding:20px 24px;max-width:1100px;margin:0 auto;}

/* STATUS BAR */
.status-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.status-date{font-size:15px;font-weight:700;}
.status-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
  font-family:'DM Mono',monospace;border:1px solid transparent;
}
.chip.ok{background:#e4f5ee;color:var(--ok);border-color:#b6e8d0;}
.chip.missing{background:#fde8ec;color:var(--missing);border-color:#f5b8c4;}
.chip-dot{width:5px;height:5px;border-radius:50%;}

/* GLOBAL CARDS */
.global-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;margin-bottom:24px;
}
.global-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.global-card-label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:6px;}
.global-card-value{font-size:26px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;}
.global-card-sub{font-size:10px;color:var(--text-muted);margin-top:4px;font-family:'DM Mono',monospace;}

/* SECTION TITLE */
.section-title{
  font-size:10px;font-family:'DM Mono',monospace;color:var(--text-muted);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.cat-badge{
  display:inline-block;padding:1px 7px;border-radius:4px;
  font-size:10px;font-family:'DM Mono',monospace;font-weight:500;
  background:var(--surface2);color:var(--text-muted);margin-left:6px;vertical-align:middle;
}

/* SHOPS GRID */
.shops-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;margin-bottom:28px;
}
.shop-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.shop-card.missing-card{border-color:#f5b8c4;background:#fffafb;}
.shop-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-bottom:1px solid var(--border);
}
.shop-name{font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px;letter-spacing:.3px;}
.shop-color-bar{width:3px;height:14px;border-radius:2px;}
.shop-total{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--text-muted);}
.shop-rows{padding:8px 14px 10px;}
.shop-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:3px 0;border-bottom:1px solid var(--surface2);font-size:12px;gap:8px;
}
.shop-row:last-child{border-bottom:none;}
.shop-row-name{color:var(--text-muted);}
.shop-row-qty{font-family:'DM Mono',monospace;font-weight:600;color:var(--text);min-width:24px;text-align:right;}
.shop-missing-msg{padding:12px 14px;font-size:12px;color:var(--missing);font-family:'DM Mono',monospace;}

/* SYNTHÈSE TABLE */
.synth-table{
  width:100%;border-collapse:collapse;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;overflow:hidden;
  margin-bottom:28px;font-size:12px;
}
.synth-table thead tr{background:var(--surface2);}
.synth-table th{
  padding:9px 12px;text-align:left;font-size:10px;font-family:'DM Mono',monospace;
  font-weight:500;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.synth-table th.num{text-align:right;}
.synth-table td{padding:7px 12px;border-bottom:1px solid var(--surface2);color:var(--text);}
.synth-table td.num{text-align:right;font-family:'DM Mono',monospace;font-weight:600;}
.synth-table td.total-col{font-family:'DM Mono',monospace;font-weight:700;font-size:13px;}
.synth-table tr:last-child td{border-bottom:none;}
.synth-table tr:hover td{background:var(--bg);}
.zero{color:var(--text-dim)!important;font-weight:400!important;}
.synth-table tfoot td{
  background:var(--surface2);font-weight:700;
  border-top:2px solid var(--border);font-family:'DM Mono',monospace;font-size:12px;
}

/* LOADING / EMPTY / ERROR */
.loading-box{display:none;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;text-align:center;}
.loading-box.active{display:flex;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-txt{font-size:13px;line-height:1.6;}
.error-box{display:none;background:#fde8ec;border:1px solid #f5b8c4;border-radius:9px;
  padding:13px 16px;font-size:13px;color:var(--missing);font-family:'DM Mono',monospace;margin-bottom:20px;}
.error-box.active{display:block;}

@media(max-width:600px){
  .header,.toolbar,.main{padding-left:16px;padding-right:16px;}
  .shops-grid{grid-template-columns:1fr 1fr;}
  .global-grid{grid-template-columns:repeat(3,1fr);}
  .synth-table{font-size:11px;}
  .sep{display:none;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">H</div>
    <div>
      <div class="logo-title">HIRO REPORT</div>
      <div class="logo-sub">synthèse quotidienne</div>
    </div>
  </div>
  <div class="clock" id="clockEl">—</div>
</div>

<div class="toolbar">
  <span class="date-label">DATE</span>
  <input type="date" class="date-input" id="reportDate">
  <div class="nav-dates">
    <button class="nav-btn" onclick="shiftDay(-1)">← Veille</button>
    <button class="nav-btn" onclick="setToday()">Aujourd'hui</button>
    <button class="nav-btn" onclick="shiftDay(1)">Lendemain →</button>
  </div>
  <div class="sep"></div>
  <button class="btn-load" id="btnLoad" onclick="loadReport()">↻ Charger</button>
</div>

<div class="main">
  <div class="error-box" id="errorBox"></div>
  <div class="loading-box" id="loadingBox">
    <div class="spinner"></div>
    <div class="loading-txt">Chargement des commandes…</div>
  </div>

  <div id="reportContent" style="display:none">
    <div class="status-bar">
      <div class="status-date" id="statusDate"></div>
      <div class="status-chips" id="statusChips"></div>
    </div>
    <div class="section-title">VUE D'ENSEMBLE</div>
    <div class="global-grid" id="globalGrid"></div>
    <div class="section-title">COMMANDES PAR BOUTIQUE</div>
    <div class="shops-grid" id="shopsGrid"></div>
    <div class="section-title">SYNTHÈSE PRODUITS <span class="cat-badge">toutes boutiques</span></div>
    <table class="synth-table" id="synthTable"></table>
  </div>

  <div class="empty" id="emptyState">
    <div class="empty-icon">📋</div>
    <div class="empty-txt">Sélectionnez une date et cliquez sur <strong>Charger</strong>.</div>
  </div>
</div>

<script>
const _KEY = 'AIzaSyAeGNmrF96_64HYYQom7xsGM09BjNeI6EE';
const _BASE = 'https://firestore.googleapis.com/v1/projects/hiro-sushi-nc/databases/(default)/documents';

const SHOPS = [
  { id:'dsm',   label:'DSM',   color:'#1a5fa8' },
  { id:'mgt',   label:'MGT',   color:'#c45e00' },
  { id:'paita', label:'Paita', color:'#7c3aed' },
  { id:'ville', label:'Ville', color:'#c41a3a' }
];

const CATEGORIES = [
  { label:'Salades & Entrées', keys:['bo','sin','thai','thon','plp','rouleaux','tataki'] },
  { label:'Riz & Poke',        keys:['rizprod','pokethon','pokesaumon'] },
  { label:'Rolls',             keys:['villerolls'] },
  { label:'Desserts',          keys:['tiramisu','ananas','poebanane','poecitrouille','cheesemangue','cheeseframboise'] },
  { label:'Tapas',             keys:['gyoza','siumai','gnem','pnem','sesame','banhbao','samossa','brochettes'] }
];

const PRODUCT_NAMES = {
  bo:'Bun Bò', sin:'Singapour', thai:'Thaï', thon:'Thon mariné',
  plp:'Poulpe', rouleaux:'Rouleau', tataki:'Tataki',
  rizprod:'Riz', pokethon:'Poke thon', pokesaumon:'Poke saumon',
  villerolls:'Rolls', tiramisu:'Tiramisu', ananas:'Ananas',
  poebanane:'Poe banane', poecitrouille:'Poe citrouille',
  cheesemangue:'Cheese mangue', cheeseframboise:'Cheese framboise',
  gyoza:'Gyoza', siumai:'Siu Mai', gnem:'Grand nem', pnem:'Petit nem',
  sesame:'Sésame', banhbao:'Banh Bao', samossa:'Samossa', brochettes:'Brochettes'
};

// Clock
function updateClock(){
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Pacific/Noumea'}));
  document.getElementById('clockEl').textContent =
    'NC '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}
setInterval(updateClock,10000); updateClock();

// Date helpers
function todayNC(){
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Pacific/Noumea'}));
  return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
}
function setToday(){ document.getElementById('reportDate').value=todayNC(); loadReport(); }
function shiftDay(n){
  const v=document.getElementById('reportDate').value;
  if(!v) return;
  const d=new Date(v+'T12:00:00'); d.setDate(d.getDate()+n);
  document.getElementById('reportDate').value=d.toISOString().split('T')[0];
  loadReport();
}
document.getElementById('reportDate').value=todayNC();

// Fetch
async function fetchOrder(dateStr, shopId){
  const res = await fetch(`${_BASE}/hiro-orders/order_${dateStr}_${shopId}?key=${_KEY}`);
  if(!res.ok) return null;
  const json = await res.json();
  if(!json.fields) return null;
  const o={};
  Object.entries(json.fields).forEach(([k,v])=>{
    if(v.integerValue!==undefined) o[k]=parseInt(v.integerValue);
    else if(v.stringValue!==undefined) o[k]=v.stringValue;
  });
  return o;
}

// Load
async function loadReport(){
  const dateStr=document.getElementById('reportDate').value;
  if(!dateStr){ showError('Veuillez sélectionner une date.'); return; }
  setLoading(true); hideError();
  document.getElementById('reportContent').style.display='none';
  document.getElementById('emptyState').style.display='none';
  try{
    const results=await Promise.all(SHOPS.map(s=>fetchOrder(dateStr,s.id).then(o=>({shop:s,order:o}))));
    setLoading(false);
    renderReport(dateStr,results);
  }catch(err){
    setLoading(false);
    showError('Erreur réseau : '+err.message);
  }
}

// Render
function renderReport(dateStr, results){
  // Date label
  const d=new Date(dateStr+'T12:00:00');
  const dl=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('statusDate').textContent=dl.charAt(0).toUpperCase()+dl.slice(1);

  // Chips
  document.getElementById('statusChips').innerHTML=results.map(({shop,order})=>
    `<div class="chip ${order?'ok':'missing'}">
      <div class="chip-dot" style="background:${order?'#0d7a52':'#c41a3a'}"></div>
      ${shop.label}
    </div>`
  ).join('');

  // Calculs globaux
  const orders={};
  results.forEach(({shop,order})=>{ orders[shop.id]=order; });
  const totaux={};
  const allKeys=Object.keys(PRODUCT_NAMES);
  allKeys.forEach(k=>{ totaux[k]=0; });
  let grandTotal=0, boutiquesOk=0;
  results.forEach(({order})=>{
    if(!order) return;
    boutiquesOk++;
    allKeys.forEach(k=>{ const q=order[k]||0; totaux[k]+=q; grandTotal+=q; });
  });
  let topProd='',topQty=0;
  Object.entries(totaux).forEach(([k,v])=>{
    if(k!=='rizprod'&&v>topQty){ topQty=v; topProd=PRODUCT_NAMES[k]||k; }
  });

  // Global cards
  document.getElementById('globalGrid').innerHTML=`
    <div class="global-card">
      <div class="global-card-label">TOTAL ARTICLES</div>
      <div class="global-card-value">${grandTotal}</div>
      <div class="global-card-sub">toutes boutiques</div>
    </div>
    <div class="global-card">
      <div class="global-card-label">BOUTIQUES</div>
      <div class="global-card-value">${boutiquesOk}<span style="font-size:14px;color:var(--text-muted)"> / 4</span></div>
      <div class="global-card-sub">ont commandé</div>
    </div>
    <div class="global-card">
      <div class="global-card-label">TOP PRODUIT</div>
      <div class="global-card-value" style="font-size:16px;margin-top:4px;">${topProd||'—'}</div>
      <div class="global-card-sub">${topQty>0?topQty+' unités':''}</div>
    </div>
    <div class="global-card">
      <div class="global-card-label">RIZ TOTAL</div>
      <div class="global-card-value">${totaux['rizprod']||0}</div>
      <div class="global-card-sub">portions</div>
    </div>
  `;

  // Shop cards
  const sg=document.getElementById('shopsGrid');
  sg.innerHTML='';
  results.forEach(({shop,order})=>{
    const card=document.createElement('div');
    card.className='shop-card'+(order?'':' missing-card');
    let shopTotal=0, rows='';
    if(order){
      CATEGORIES.forEach(cat=>{
        cat.keys.forEach(k=>{
          const qty=order[k]||0;
          if(qty>0){
            rows+=`<div class="shop-row"><span class="shop-row-name">${PRODUCT_NAMES[k]||k}</span><span class="shop-row-qty">${qty}</span></div>`;
            shopTotal+=qty;
          }
        });
      });
      // libres
      if(order.libre){try{const lb=JSON.parse(order.libre);['chr','tarte'].forEach(t=>{if(lb[t])lb[t].filter(i=>i.qty>0).forEach(i=>{rows+=`<div class="shop-row"><span class="shop-row-name" style="font-style:italic">${i.name}</span><span class="shop-row-qty">${i.qty}</span></div>`;shopTotal+=i.qty;});});}catch(e){}}
    }
    card.innerHTML=`
      <div class="shop-header">
        <div class="shop-name"><div class="shop-color-bar" style="background:${shop.color}"></div>${shop.label}</div>
        <div class="shop-total">${order?shopTotal+' art.':'—'}</div>
      </div>
      ${order
        ?`<div class="shop-rows">${rows||'<div style="padding:8px 0;font-size:11px;color:var(--text-dim);font-family:DM Mono,monospace">Commande vide</div>'}</div>`
        :`<div class="shop-missing-msg">✗ Pas de commande</div>`
      }`;
    sg.appendChild(card);
  });

  // Synthèse table
  const table=document.getElementById('synthTable');
  let thead=`<thead><tr><th>Produit</th><th>Catégorie</th>${SHOPS.map(s=>`<th class="num" style="color:${s.color}">${s.label}</th>`).join('')}<th class="num">TOTAL</th></tr></thead>`;
  let tbody='<tbody>';
  const ft=[0,0,0,0]; let fg=0;
  CATEGORIES.forEach(cat=>{
    cat.keys.forEach(k=>{
      const qs=SHOPS.map(s=>(orders[s.id]?.[k])||0);
      const tot=qs.reduce((a,b)=>a+b,0);
      if(tot===0) return;
      qs.forEach((q,i)=>{ ft[i]+=q; }); fg+=tot;
      tbody+=`<tr><td>${PRODUCT_NAMES[k]||k}</td><td style="color:var(--text-muted);font-size:11px;">${cat.label}</td>${qs.map(q=>`<td class="num${q===0?' zero':''}">${q||'—'}</td>`).join('')}<td class="num total-col">${tot}</td></tr>`;
    });
  });
  tbody+='</tbody>';
  const tfoot=`<tfoot><tr><td colspan="2">TOTAL</td>${ft.map(t=>`<td class="num">${t}</td>`).join('')}<td class="num">${fg}</td></tr></tfoot>`;
  table.innerHTML=thead+tbody+tfoot;

  document.getElementById('reportContent').style.display='block';
}

// Helpers
function setLoading(a){
  document.getElementById('loadingBox').className=a?'loading-box active':'loading-box';
  document.getElementById('btnLoad').disabled=a;
}
function showError(m){ const e=document.getElementById('errorBox'); e.textContent=m; e.className='error-box active'; }
function hideError(){ document.getElementById('errorBox').className='error-box'; }
</script>
</body>
</html>
