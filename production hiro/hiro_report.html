<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report — Rapport IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --surface:  #161616;
  --surface2: #1e1e1e;
  --border:   #2a2a2a;
  --border2:  #333333;
  --text:     #f0ede8;
  --text-2:   #a0998f;
  --text-3:   #4a4540;
  --accent:   #f0ede8;
  --gold:     #c9a96e;
  --gold2:    #e8c98a;
  --dsm:      #4a9eff;
  --mgt:      #ff8f4a;
  --paita:    #b47fff;
  --ville:    #ff5c7a;
  --ok:       #4caf82;
  --miss:     #ff5c7a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NOISE TEXTURE ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.6;
}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:60px;
  background:rgba(10,10,10,.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.logo{display:flex;align-items:center;gap:14px;}
.logo-mark{
  width:30px;height:30px;
  border:1px solid var(--border2);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:900;
  color:var(--gold);
  letter-spacing:-0.5px;
}
.logo-title{
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:700;
  color:var(--text);letter-spacing:.5px;
}
.logo-sub{
  font-family:'DM Mono',monospace;
  font-size:9px;color:var(--text-2);
  letter-spacing:2px;text-transform:uppercase;
  margin-top:1px;
}
.header-right{display:flex;align-items:center;gap:16px;}
.clock{
  font-family:'DM Mono',monospace;
  font-size:11px;color:var(--text-2);
  letter-spacing:1px;
}
.header-divider{width:1px;height:18px;background:var(--border);}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:14px 32px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}
.date-label{
  font-family:'DM Mono',monospace;
  font-size:9px;color:var(--text-3);
  letter-spacing:2px;text-transform:uppercase;
}
.date-input{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'DM Mono',monospace;font-size:12px;
  padding:8px 12px;border-radius:6px;
  cursor:pointer;outline:none;
  transition:border-color .2s;
  letter-spacing:.5px;
}
.date-input:focus{border-color:var(--gold);}
.date-input::-webkit-calendar-picker-indicator{filter:invert(.4);cursor:pointer;}
.nav-dates{display:flex;gap:6px;}
.nav-btn{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-2);
  font-family:'DM Mono',monospace;font-size:10px;
  padding:7px 12px;border-radius:6px;cursor:pointer;
  transition:all .15s;letter-spacing:.5px;white-space:nowrap;
}
.nav-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface);}
.sep{flex:1;}
.btn-load{
  display:flex;align-items:center;gap:8px;
  background:var(--text);color:var(--bg);
  border:none;padding:9px 20px;border-radius:6px;
  font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:opacity .15s,transform .1s;
  letter-spacing:.3px;
}
.btn-load:hover{opacity:.88;}
.btn-load:active{transform:scale(.97);}
.btn-load:disabled{opacity:.3;cursor:not-allowed;transform:none;}

/* ── MAIN ── */
.main{padding:28px 32px;max-width:1120px;margin:0 auto;position:relative;z-index:1;}

/* ── STATUS BAR ── */
.status-bar{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:16px;flex-wrap:wrap;
  margin-bottom:32px;
  padding-bottom:24px;
  border-bottom:1px solid var(--border);
}
.status-date-wrap{}
.status-eyebrow{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-3);letter-spacing:2.5px;text-transform:uppercase;
  margin-bottom:6px;
}
.status-date{
  font-family:'Playfair Display',serif;
  font-size:28px;font-weight:700;
  color:var(--text);line-height:1;
}
.status-chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:4px;
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:.5px;border:1px solid transparent;
  transition:opacity .2s;
}
.chip.ok{background:#4caf8210;color:var(--ok);border-color:#4caf8230;}
.chip.miss{background:#ff5c7a10;color:var(--miss);border-color:#ff5c7a30;}
.chip-dot{width:5px;height:5px;border-radius:50%;}

/* ── GLOBAL CARDS ── */
.global-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:40px;
}
.global-card{
  background:var(--surface);
  padding:22px 24px;
  transition:background .2s;
}
.global-card:hover{background:var(--surface2);}
.global-card-eyebrow{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-3);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:10px;
}
.global-card-value{
  font-family:'Playfair Display',serif;
  font-size:42px;font-weight:900;
  color:var(--text);line-height:1;
  margin-bottom:6px;
}
.global-card-value.gold{color:var(--gold);}
.global-card-value .small{font-size:18px;color:var(--text-2);}
.global-card-sub{font-size:11px;color:var(--text-2);font-weight:300;}



/* ── SECTION TITLE ── */
.section-title{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;
}
.section-title-text{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-3);letter-spacing:2.5px;text-transform:uppercase;
  white-space:nowrap;
}
.section-title-line{flex:1;height:1px;background:var(--border);}
.section-title-badge{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-3);letter-spacing:1px;
  padding:2px 8px;border:1px solid var(--border);border-radius:3px;
  white-space:nowrap;
}

/* ── SHOPS GRID ── */
.carousel-scene{
  perspective:1200px;
  margin-bottom:56px;
  position:relative;
}
.carousel-3d{
  width:100%;
  position:relative;
  transform-style:preserve-3d;
  min-height:200px;
  transition:height .4s ease;
}
.shop-card{
  position:absolute;
  width:340px;
  left:50%;
  top:0;
  margin-left:-170px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  transform-style:preserve-3d;
  transition:all .6s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
  backface-visibility:hidden;
}
.shop-card.miss-card{border-color:#ff5c7a20;}
.shop-card.active{
  border-color:var(--border2);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  cursor:default;
}
.shop-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.shop-header::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
}
.shop-card-dsm .shop-header::before{background:var(--dsm);}
.shop-card-mgt .shop-header::before{background:var(--mgt);}
.shop-card-paita .shop-header::before{background:var(--paita);}
.shop-card-ville .shop-header::before{background:var(--ville);}
.shop-card-asia .shop-header::before{background:#a3e635;}
.shop-name{
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  letter-spacing:.5px;padding-left:8px;
}
.shop-total{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-2);}
.shop-rows{padding:10px 20px 16px;}
.shop-rows::-webkit-scrollbar{width:3px;}
.shop-rows::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.shop-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:4px 0;border-bottom:1px solid var(--border);gap:8px;
}
.shop-row:last-child{border-bottom:none;}
.shop-row-name{font-size:12px;color:var(--text-2);font-weight:300;}
.shop-row-qty{
  font-family:'DM Mono',monospace;font-size:12px;font-weight:500;
  color:var(--text);min-width:28px;text-align:right;
}
.shop-miss-msg{
  padding:14px 20px;font-family:'DM Mono',monospace;
  font-size:11px;color:var(--miss);letter-spacing:.5px;opacity:.7;
}
.carousel-nav{
  display:flex;align-items:center;justify-content:center;
  gap:16px;margin-top:12px;
}
.carousel-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-2);font-size:16px;
  width:36px;height:36px;border-radius:50%;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.carousel-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
.carousel-dots{display:flex;gap:8px;}
.carousel-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--border2);cursor:pointer;
  transition:all .2s;
}
.carousel-dot.active{background:var(--gold);width:18px;border-radius:3px;}

/* ── SYNTH TABLE ── */
.table-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:40px;
}
.synth-table{
  width:100%;border-collapse:collapse;
  font-size:12px;
}
.synth-table thead tr{background:var(--surface2);}
.synth-table th{
  padding:11px 16px;text-align:left;
  font-family:'DM Mono',monospace;font-size:9px;
  font-weight:500;color:var(--text-3);
  letter-spacing:2px;text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.synth-table th.num{text-align:right;}
.synth-table td{
  padding:9px 16px;
  border-bottom:1px solid var(--border);
  color:var(--text);font-weight:300;
  transition:background .15s;
}
.synth-table tbody tr:hover td{background:var(--surface2);}
.synth-table tbody tr:last-child td{border-bottom:none;}
.synth-table td.num{
  text-align:right;
  font-family:'DM Mono',monospace;
  font-weight:500;
}
.synth-table td.total-col{
  font-family:'DM Mono',monospace;
  font-weight:600;font-size:13px;
  color:var(--text);
}
.zero{color:var(--text-3)!important;font-weight:300!important;}
.synth-table tfoot td{
  padding:11px 16px;
  background:var(--surface2);
  border-top:1px solid var(--border2);
  font-family:'DM Mono',monospace;
  font-size:11px;font-weight:600;
  color:var(--text);
}
.synth-table tfoot td.num{text-align:right;}
.cat-row td{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase;
  background:var(--bg2)!important;
  padding:7px 16px;border-bottom:1px solid var(--border);
}

/* ── LOADING / EMPTY / ERROR ── */
.loading-box{
  display:none;flex-direction:column;align-items:center;
  gap:16px;padding:80px 20px;text-align:center;
}
.loading-box.active{display:flex;}
.spinner{
  width:28px;height:28px;
  border:1px solid var(--border);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--text-3);letter-spacing:1px;
}
.empty{text-align:center;padding:80px 20px;}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.3;}
.empty-txt{
  font-size:13px;color:var(--text-2);
  font-weight:300;line-height:1.7;
}
.error-box{
  display:none;
  background:#ff5c7a0a;border:1px solid #ff5c7a25;
  border-radius:8px;padding:13px 16px;
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--miss);letter-spacing:.3px;
  margin-bottom:20px;
}
.error-box.active{display:block;}

/* ── ANIMATIONS ── */
.fade-in{animation:fadeIn .35s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:700px){
  .header,.toolbar,.main{padding-left:16px;padding-right:16px;}
  .global-grid{grid-template-columns:1fr 1fr;}
  .shops-grid{grid-template-columns:1fr 1fr;}
  .status-date{font-size:20px;}
  .global-card-value{font-size:30px;}
  .sep{display:none;}
}
@media(max-width:420px){
  .shops-grid{grid-template-columns:1fr;}
  .global-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">H</div>
    <div>
      <div class="logo-title">Hiro Report</div>
      <div class="logo-sub">Synthèse quotidienne</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock" id="clockEl">——:——</div>
    <div class="header-divider"></div>
    <div class="clock" style="color:var(--text-3);">NC</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="date-label">Date</span>
  <input type="date" class="date-input" id="reportDate">
  <div class="nav-dates">
    <button class="nav-btn" onclick="shiftDay(-1)">← Veille</button>
    <button class="nav-btn" onclick="setToday()">Aujourd'hui</button>
    <button class="nav-btn" onclick="shiftDay(1)">Lendemain →</button>
  </div>
  <div class="sep"></div>
  <button class="btn-load" id="btnLoad" onclick="loadReport()">
    Charger
  </button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="error-box" id="errorBox"></div>

  <div class="loading-box" id="loadingBox">
    <div class="spinner"></div>
    <div class="loading-txt">Chargement des commandes…</div>
  </div>

  <div id="reportContent" style="display:none">

    <!-- Status -->
    <div class="status-bar fade-in">
      <div class="status-date-wrap">
        <div class="status-eyebrow">Rapport du</div>
        <div class="status-date" id="statusDate"></div>
      </div>
      <div class="status-chips" id="statusChips"></div>
    </div>

    <!-- Global KPIs -->
    <div class="global-grid fade-in" id="globalGrid"></div>
    <!-- Boutiques -->
    <div class="section-title fade-in">
      <span class="section-title-text">Commandes par boutique</span>
      <div class="section-title-line"></div>
    </div>
    <div class="carousel-scene fade-in">
      <div class="carousel-3d" id="carousel3d"></div>
    </div>
    <div class="carousel-nav">
      <button class="carousel-btn" onclick="carouselPrev()">&#8592;</button>
      <div class="carousel-dots" id="carouselDots"></div>
      <button class="carousel-btn" onclick="carouselNext()">&#8594;</button>
    </div>

    <!-- Synthèse -->
    <div class="section-title fade-in">
      <span class="section-title-text">Synthèse produits</span>
      <div class="section-title-line"></div>
      <span class="section-title-badge">toutes boutiques</span>
    </div>
    <div class="table-wrap fade-in">
      <table class="synth-table" id="synthTable"></table>
    </div>

  </div>

  <div class="empty" id="emptyState">
    <div class="empty-icon">◈</div>
    <div class="empty-txt">Sélectionnez une date<br>et cliquez sur <strong>Charger</strong></div>
  </div>
</div>

<script>
const _KEY  = 'AIzaSyAeGNmrF96_64HYYQom7xsGM09BjNeI6EE';
const _BASE = 'https://firestore.googleapis.com/v1/projects/hiro-sushi-nc/databases/(default)/documents';

const SHOPS = [
  { id:'dsm',   label:'DSM',   color:'#4a9eff' },
  { id:'mgt',   label:'MGT',   color:'#ff8f4a' },
  { id:'paita', label:'Paita', color:'#b47fff' },
  { id:'ville', label:'Ville', color:'#ff5c7a' },
  { id:'asia',  label:'Asia',  color:'#a3e635' }
];

const CATEGORIES = [
  { label:'Salades',  keys:['bo','sin','thai','thon','plp'] },
  { label:'Rouleaux', keys:['rouleaux'] },
  { label:'Tataki',   keys:['tataki'] },
  { label:'Riz',      keys:['rizprod'] },
  { label:'Poke',     keys:['pokethon','pokesaumon'] },
  { label:'Rolls',    keys:['rolls','villerolls'] },
  { label:'Desserts', keys:['tiramisu','ananas','poebanane','poecitrouille','cheesemangue','cheeseframboise'] },
  { label:'Tapas',    keys:['gyoza','siumai','gnem','pnem','sesame','banhbao','samossa','brochettes'] }
];

const P = {
  bo:'Bun Bò', sin:'Singapour', thai:'Thaï', thon:'Thon mariné',
  plp:'Poulpe', rouleaux:'Rouleau', tataki:'Tataki',
  rizprod:'Riz', pokethon:'Poke thon', pokesaumon:'Poke saumon',
  rolls:'Rolls', villerolls:'Rolls (Ville)', tiramisu:'Tiramisu', ananas:'Ananas',
  poebanane:'Poe banane', poecitrouille:'Poe citrouille',
  cheesemangue:'Cheese mangue', cheeseframboise:'Cheese framboise',
  gyoza:'Gyoza', siumai:'Siu Mai', gnem:'Grand nem', pnem:'Petit nem',
  sesame:'Sésame', banhbao:'Banh Bao', samossa:'Samossa', brochettes:'Brochettes'
};

// Clock
function updateClock(){
  const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Pacific/Noumea'}));
  document.getElementById('clockEl').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
setInterval(updateClock,10000); updateClock();

// Date helpers
function todayNC(){
  const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Pacific/Noumea'}));
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function setToday(){ document.getElementById('reportDate').value=todayNC(); loadReport(); }
function shiftDay(n){
  const v=document.getElementById('reportDate').value; if(!v) return;
  const d=new Date(v+'T12:00:00'); d.setDate(d.getDate()+n);
  document.getElementById('reportDate').value=d.toISOString().split('T')[0];
  loadReport();
}
document.getElementById('reportDate').value=todayNC();

// Fetch order
async function fetchOrder(dateStr, shopId){
  const res=await fetch(`${_BASE}/hiro-orders/order_${dateStr}_${shopId}?key=${_KEY}`);
  if(!res.ok) return null;
  const j=await res.json();
  if(!j.fields) return null;
  const o={};
  Object.entries(j.fields).forEach(([k,v])=>{
    if(v.integerValue!==undefined) o[k]=parseInt(v.integerValue);
    else if(v.stringValue!==undefined) o[k]=v.stringValue;
  });
  return o;
}

// Fetch rolls depuis hiro-production (clé: YYYY-MM-DD__r__shop)
async function fetchRolls(dateStr){
  // Trouver le lundi de la semaine
  const d=new Date(dateStr+'T12:00:00');
  const day=d.getDay(); const diff=(day===0?-6:1-day);
  d.setDate(d.getDate()+diff);
  const monday=d.toISOString().split('T')[0];
  const url=`${_BASE}/hiro-production/week_${monday}?key=${_KEY}`;
  const res=await fetch(url);
  if(!res.ok) return {};
  const j=await res.json();
  if(!j.fields) return {};
  const rolls={};
  SHOPS.forEach(s=>{
    // Essayer les deux formats de clé possibles
    const key1=`${dateStr}__r__${s.id}`;
    const key2=`${dateStr}__r__${s.id}__auto`;
    const v=j.fields[key1]||j.fields[key2];
    if(v&&v.integerValue!==undefined) rolls[s.id]=parseInt(v.integerValue);
    else if(v&&v.doubleValue!==undefined) rolls[s.id]=Math.round(parseFloat(v.doubleValue));
    else rolls[s.id]=0;
  });
  console.log('Rolls fetched:', rolls);
  return rolls;
}

// Load
async function loadReport(){
  const dateStr=document.getElementById('reportDate').value;
  if(!dateStr){ showError('Veuillez sélectionner une date.'); return; }
  setLoading(true); hideError();
  document.getElementById('reportContent').style.display='none';
  document.getElementById('emptyState').style.display='none';
  try{
    const [results, rolls]=await Promise.all([
      Promise.all(SHOPS.map(s=>fetchOrder(dateStr,s.id).then(o=>({shop:s,order:o})))),
      fetchRolls(dateStr)
    ]);
    // Injecter les rolls dans chaque order
    // Asia n'a pas d'interface de commande -> créer un order virtuel avec juste les rolls
    results.forEach(({shop,order})=>{
      if(order){
        order['rolls']=rolls[shop.id]||0;
      } else if(shop.id==='asia' && rolls['asia']>0){
        // order virtuel pour Asia (rolls uniquement)
        results.find(r=>r.shop.id==='asia').order = { rolls: rolls['asia'] };
      }
    });
    setLoading(false);
    renderReport(dateStr,results);
  }catch(e){
    setLoading(false);
    showError('Erreur réseau : '+e.message);
  }
}

// Render
function renderReport(dateStr, results){
  const d=new Date(dateStr+'T12:00:00');
  const dl=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('statusDate').textContent=dl.charAt(0).toUpperCase()+dl.slice(1);

  // Chips
  document.getElementById('statusChips').innerHTML=results.map(({shop,order})=>
    `<div class="chip ${order?'ok':'miss'}">
      <div class="chip-dot" style="background:${order?'var(--ok)':'var(--miss)'}"></div>
      ${shop.label}
    </div>`
  ).join('');

  // Calculs
  const orders={}; results.forEach(({shop,order})=>{ orders[shop.id]=order; });
  const totaux={}; const allKeys=Object.keys(P); allKeys.forEach(k=>totaux[k]=0);
  let grandTotal=0, boutiquesOk=0;
  results.forEach(({order})=>{
    if(!order) return; boutiquesOk++;
    allKeys.forEach(k=>{ const q=order[k]||0; totaux[k]+=q; grandTotal+=q; });
  });
  let topK='',topV=0;
  Object.entries(totaux).forEach(([k,v])=>{ if(k!=='rizprod'&&v>topV){topV=v;topK=k;} });

  // Totaux par catégorie (KPI cards)
  const CAT_KPI = [
    { label:'Salades',  keys:['bo','sin','thai','thon','plp'],                                                      color:'var(--gold)' },
    { label:'Rouleaux', keys:['rouleaux'],                                                                          color:'#ff8f4a' },
    { label:'Tataki',   keys:['tataki'],                                                                            color:'#e879f9' },
    { label:'Riz',      keys:['rizprod'],                                                                           color:'#4a9eff' },
    { label:'Poke',     keys:['pokethon','pokesaumon'],                                                             color:'#4affcf' },
    { label:'Rolls',    keys:['rolls','villerolls'],                                                                color:'#b47fff' },
    { label:'Desserts', keys:['tiramisu','ananas','poebanane','poecitrouille','cheesemangue','cheeseframboise'],    color:'#ff5c7a' },
    { label:'Tapas',    keys:['gyoza','siumai','gnem','pnem','sesame','banhbao','samossa','brochettes'],            color:'var(--ok)' }
  ];
  const catTotaux = CAT_KPI.map(cat=>({
    ...cat,
    total: cat.keys.reduce((s,k)=>s+totaux[k],0)
  }));

  document.getElementById('globalGrid').innerHTML = catTotaux.map(cat=>`
    <div class="global-card">
      <div class="global-card-eyebrow">${cat.label}</div>
      <div class="global-card-value" style="color:${cat.color}">${cat.total}</div>
      <div class="global-card-sub">${boutiquesOk} boutique${boutiquesOk>1?'s':''}</div>
    </div>`).join('');



  // Carousel 3D
  const carousel = document.getElementById('carousel3d');
  carousel.innerHTML='';
  const dots = document.getElementById('carouselDots');
  dots.innerHTML='';
  let _carouselIdx = 0;
  const _cards = [];

  results.forEach(({shop,order},idx)=>{
    const c=document.createElement('div');
    c.className=`shop-card shop-card-${shop.id}${order?'':' miss-card'}`;
    c.onclick=()=>{ if(idx!==_carouselIdx) setCarousel(idx); };
    let total=0,rows='';
    if(order){
      CATEGORIES.forEach(cat=>cat.keys.forEach(k=>{
        const q=order[k]||0; if(!q) return;
        rows+=`<div class="shop-row"><span class="shop-row-name">${P[k]||k}</span><span class="shop-row-qty">${q}</span></div>`;
        total+=q;
      }));
      if(order.libre){try{const lb=JSON.parse(order.libre);['chr','tarte'].forEach(t=>{if(lb[t])lb[t].filter(i=>i.qty>0).forEach(i=>{rows+=`<div class="shop-row"><span class="shop-row-name" style="font-style:italic">${i.name}</span><span class="shop-row-qty">${i.qty}</span></div>`;total+=i.qty;});});}catch(e){}}
    }
    c.innerHTML=`
      <div class="shop-header">
        <div class="shop-name">${shop.label}</div>
        <div class="shop-total">${order?total+' art.':'—'}</div>
      </div>
      ${order
        ?`<div class="shop-rows">${rows||'<div style="padding:8px 0;font-size:11px;color:var(--text-3);font-family:DM Mono,monospace">Commande vide</div>'}</div>`
        :`<div class="shop-miss-msg">✗ Pas de commande</div>`}`;
    carousel.appendChild(c);
    _cards.push(c);

    // dot
    const dot=document.createElement('div');
    dot.className='carousel-dot'+(idx===0?' active':'');
    dot.onclick=()=>setCarousel(idx);
    dots.appendChild(dot);
  });

  function setCarousel(idx){
    _carouselIdx=idx;
    const n=_cards.length;
    const angleStep=360/n;
    const radius=360;
    _cards.forEach((card,i)=>{
      const angle=(i-idx)*angleStep;
      const rad=angle*Math.PI/180;
      const x=Math.sin(rad)*radius;
      const z=Math.cos(rad)*radius-radius;
      const scale=0.72+0.28*Math.cos(rad);
      const opacity=i===idx?1:0.45+0.25*Math.cos(rad);
      card.style.transform=`translateX(${x}px) translateZ(${z}px) scale(${scale})`;
      card.style.opacity=opacity;
      card.style.zIndex=Math.round(scale*10);
      card.classList.toggle('active',i===idx);
    });
    document.querySelectorAll('.carousel-dot').forEach((d,i)=>{
      d.classList.toggle('active',i===idx);
    });
    // Adapter la hauteur de la scène à la carte active
    const activeCard = _cards[idx];
    const h = activeCard.offsetHeight;
    if(h>0) carousel.style.height = h+'px';
  }
  // Recalcul hauteur après chargement complet
  function resizeCarousel(){
    if(_cards[_carouselIdx]) {
      carousel.style.height = _cards[_carouselIdx].offsetHeight+'px';
    }
  }
  window.addEventListener('resize', resizeCarousel);
  setTimeout(resizeCarousel, 100);
  window.carouselNext=()=>setCarousel((_carouselIdx+1)%_cards.length);
  window.carouselPrev=()=>setCarousel((_carouselIdx-1+_cards.length)%_cards.length);
  setCarousel(0);

  // Synthèse table
  const table=document.getElementById('synthTable');
  let html=`<thead><tr>
    <th>Produit</th>
    ${SHOPS.map(s=>`<th class="num" style="color:${s.color}">${s.label}</th>`).join('')}
    <th class="num">Total</th>
  </tr></thead><tbody>`;
  const ft=SHOPS.map(()=>0); let fg=0;
  CATEGORIES.forEach(cat=>{
    const catRows=cat.keys.map(k=>{
      const qs=SHOPS.map(s=>(orders[s.id]?.[k])||0);
      const tot=qs.reduce((a,b)=>a+b,0);
      return {k,qs,tot};
    }).filter(r=>r.tot>0);
    if(!catRows.length) return;
    html+=`<tr class="cat-row"><td colspan="${2+SHOPS.length}">${cat.label}</td></tr>`;
    catRows.forEach(({k,qs,tot})=>{
      qs.forEach((q,i)=>ft[i]+=q); fg+=tot;
      html+=`<tr>
        <td style="padding-left:24px">${P[k]||k}</td>
        ${qs.map(q=>`<td class="num${q===0?' zero':''}">${q||'—'}</td>`).join('')}
        <td class="num total-col">${tot}</td>
      </tr>`;
    });
  });
  html+=`</tbody><tfoot><tr>
    <td>Total</td>
    ${ft.map(t=>`<td class="num">${t}</td>`).join('')}
    <td class="num">${fg}</td>
  </tr></tfoot>`;
  table.innerHTML=html;

  document.getElementById('reportContent').style.display='block';
}

// Helpers
function setLoading(a){
  document.getElementById('loadingBox').className=a?'loading-box active':'loading-box';
  document.getElementById('btnLoad').disabled=a;
}
function showError(m){ const e=document.getElementById('errorBox'); e.textContent=m; e.className='error-box active'; }
function hideError(){ document.getElementById('errorBox').className='error-box'; }
</script>
</body>
</html>
